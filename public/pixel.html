<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 픽셀 아트 바이브 코딩</title>
<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly/msg/ko.js"></script>
<style>
:root{--primary:#7C4DFF;--primary-dark:#651FFF;--accent:#FF4081;--success:#00E676;--bg:#1a1a2e;--card:#16213e;--card-light:#0f3460;--text:#e0e0e0;--text-light:#9e9e9e;--border:#2a2a4a;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Header */
.app-header{background:linear-gradient(135deg,#7C4DFF,#E040FB);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(124,77,255,.4);flex-shrink:0;}
.app-header h1{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;}
.header-center{display:flex;align-items:center;gap:12px;}
.mission-badge{background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.level-badge{background:rgba(255,255,255,.3);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.header-actions{display:flex;gap:8px;}
.hdr-btn{padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.3);}

/* Main 3-panel */
.main-layout{flex:1;display:flex;gap:0;overflow:hidden;min-height:0;}
.panel{display:flex;flex-direction:column;overflow:hidden;background:var(--card);border-right:1px solid var(--border);}
.panel:last-child{border-right:none;}
.panel-header{padding:10px 14px;background:var(--card-light);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}
.panel-body{flex:1;overflow:auto;position:relative;min-height:0;}

/* Left: Pixel Canvas */
.pixel-panel{flex:0 0 35%;min-width:300px;display:flex;flex-direction:column;}
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px;}

/* Micro:bit frame */
.microbit-frame{background:#333;border-radius:24px;padding:24px 20px 16px;box-shadow:0 4px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;}
.microbit-label{font-size:10px;color:#888;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.led-grid{display:grid;gap:4px;}
.led-cell{width:100%;aspect-ratio:1;border-radius:4px;background:#1a1a1a;cursor:pointer;transition:all .15s;border:1px solid #2a2a2a;position:relative;}
.led-cell.on{box-shadow:0 0 8px currentColor,0 0 16px currentColor;border-color:transparent;}
.led-cell:hover{border-color:#666;}

/* Virtual buttons */
.microbit-buttons{display:flex;align-items:center;gap:16px;width:100%;}
.vbtn{width:48px;height:48px;border-radius:50%;border:2px solid #555;background:#222;color:#aaa;cursor:pointer;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;}
.vbtn:active{background:#7C4DFF;border-color:#7C4DFF;color:#fff;transform:scale(.92);}
.vbtn-label{font-size:10px;color:#666;text-align:center;margin-top:2px;}
.btn-group{display:flex;flex-direction:column;align-items:center;}
.microbit-buttons .spacer{flex:1;}
.shake-btn{padding:6px 14px;border-radius:12px;border:1px solid #555;background:#222;color:#aaa;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;}
.shake-btn:active{background:#FF4081;border-color:#FF4081;color:#fff;}

/* Grid size selector */
.grid-selector{display:flex;gap:4px;}
.grid-opt{padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-light);cursor:pointer;font-size:11px;font-weight:600;}
.grid-opt.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* Controls */
.canvas-controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ctrl-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.ctrl-btn:hover{border-color:var(--primary);color:var(--primary);}
.ctrl-btn.run{background:var(--primary);color:#fff;border-color:var(--primary);}
.ctrl-btn.run:hover{background:var(--primary-dark);}

/* Color picker */
.color-palette{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.color-swatch{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-swatch:hover,.color-swatch.active{border-color:#fff;transform:scale(1.15);}

/* Center: Blockly */
.blockly-panel{flex:0 0 35%;min-width:280px;}
#blocklyDiv{width:100%;height:100%;}
.dsl-preview{padding:8px 12px;background:#0a0a1a;border-top:1px solid var(--border);font-family:'Consolas','Courier New',monospace;font-size:11px;color:#7C4DFF;max-height:80px;overflow-y:auto;white-space:pre;flex-shrink:0;}

/* Right: Chat */
.chat-panel{flex:1;min-width:250px;}
.chat-history{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.chat-msg{max-width:90%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.chat-msg.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px;}
.chat-msg.ai{align-self:flex-start;background:var(--card-light);color:var(--text);border-bottom-left-radius:4px;}
.chat-msg.system{align-self:center;background:#1a0a2e;color:#CE93D8;font-size:12px;text-align:center;border-radius:10px;border:1px solid #2a1a3e;}
.chat-msg.success{align-self:center;background:#0a2e0a;color:#69F0AE;font-size:13px;font-weight:700;text-align:center;border:1px solid #1a3e1a;}
.chat-input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--card-light);}
.chat-input-area input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--card);color:var(--text);transition:border-color .2s;}
.chat-input-area input:focus{border-color:var(--primary);}
.send-btn{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:background .15s;}
.send-btn:hover{background:var(--primary-dark);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}
.hint-btn{padding:8px 12px;border:1px solid #FF4081;background:rgba(255,64,129,.1);color:#FF4081;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);color:var(--text);}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:20px;font-weight:800;}
.modal-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--card-light);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px 24px;}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.mission-card{padding:16px;border-radius:14px;border:2px solid var(--border);cursor:pointer;transition:all .2s;position:relative;background:var(--card-light);}
.mission-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,77,255,.3);}
.mission-card.completed{border-color:var(--success);}
.mission-card .m-level{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:6px;}
.mission-card .m-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.mission-card .m-desc{font-size:12px;color:var(--text-light);}
.mission-card .m-check{position:absolute;top:10px;right:10px;font-size:18px;}

/* Feedback */
.feedback-modal .modal{max-width:450px;text-align:center;padding:30px;}
.feedback-icon{font-size:64px;margin-bottom:12px;}
.feedback-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.feedback-text{font-size:14px;color:var(--text-light);margin-bottom:20px;line-height:1.6;}
.feedback-btn{padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;transition:all .15s;}
.feedback-btn.next{background:var(--primary);color:#fff;}
.feedback-btn.retry{background:var(--card-light);color:var(--text);margin-right:8px;}

.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-left-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
    .main-layout{flex-direction:column;}
    .panel{flex:none!important;min-width:0!important;border-right:none;border-bottom:1px solid var(--border);}
    .pixel-panel{height:45vh;}
    .blockly-panel{height:30vh;}
    .chat-panel{height:25vh;}
}
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
    <h1>🎨 픽셀 아트 바이브 코딩</h1>
    <div class="header-center">
        <span class="level-badge" id="levelBadge">기초</span>
        <span class="mission-badge" id="missionBadge">미션을 선택하세요</span>
    </div>
    <div class="header-actions">
        <button class="hdr-btn" onclick="openMissionSelector()">📋 미션 선택</button>
        <button class="hdr-btn" onclick="location.href='/'">← 돌아가기</button>
    </div>
</div>

<!-- Main Layout -->
<div class="main-layout">
    <!-- Left: Pixel Canvas -->
    <div class="panel pixel-panel">
        <div class="panel-header">
            <h3>💡 LED 디스플레이</h3>
            <div style="display:flex;gap:8px;align-items:center;">
                <div class="grid-selector">
                    <button class="grid-opt active" onclick="setGridSize(5,this)">5×5</button>
                    <button class="grid-opt" onclick="setGridSize(8,this)">8×8</button>
                    <button class="grid-opt" onclick="setGridSize(16,this)">16×16</button>
                </div>
                <div class="canvas-controls">
                    <button class="ctrl-btn run" onclick="runCode()">▶ 실행</button>
                    <button class="ctrl-btn" onclick="clearGrid()">🗑 초기화</button>
                </div>
            </div>
        </div>
        <div class="panel-body">
            <div class="canvas-area">
                <div class="microbit-frame">
                    <div class="microbit-label">micro:bit</div>
                    <div class="led-grid" id="ledGrid"></div>
                    <div class="microbit-buttons">
                        <div class="btn-group">
                            <button class="vbtn" id="btnA" onmousedown="pressButton('A')" onmouseup="releaseButton('A')">A</button>
                            <span class="vbtn-label">버튼 A</span>
                        </div>
                        <div class="spacer"></div>
                        <button class="shake-btn" onclick="triggerShake()">📳 흔들기</button>
                        <div class="spacer"></div>
                        <div class="btn-group">
                            <button class="vbtn" id="btnB" onmousedown="pressButton('B')" onmouseup="releaseButton('B')">B</button>
                            <span class="vbtn-label">버튼 B</span>
                        </div>
                    </div>
                </div>
                <div class="color-palette" id="colorPalette"></div>
            </div>
        </div>
    </div>

    <!-- Center: Blockly -->
    <div class="panel blockly-panel">
        <div class="panel-header">
            <h3>🧩 블록 코딩</h3>
            <button class="ctrl-btn" onclick="clearWorkspace()" style="font-size:11px;">🗑 블록 초기화</button>
        </div>
        <div class="panel-body">
            <div id="blocklyDiv"></div>
        </div>
        <div class="dsl-preview" id="dslPreview">// 블록을 조합하면 여기에 코드가 표시됩니다</div>
    </div>

    <!-- Right: Chat -->
    <div class="panel chat-panel">
        <div class="panel-header">
            <h3>💬 AI 도우미</h3>
            <button class="hint-btn" onclick="requestHint()">💡 힌트</button>
        </div>
        <div class="chat-history" id="chatHistory">
            <div class="chat-msg system">🎨 안녕! 나는 픽셀 아트 코딩 도우미야.<br>어떤 그림을 LED에 그리고 싶은지 말해줘!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="예: 하트 모양 그려줘" onkeydown="if(event.key==='Enter')sendChat()">
            <button class="send-btn" id="sendBtn" onclick="sendChat()">전송</button>
        </div>
    </div>
</div>

<!-- Mission Modal -->
<div class="modal-overlay" id="missionModal">
    <div class="modal">
        <div class="modal-header">
            <h2>📋 미션 선택</h2>
            <button class="modal-close" onclick="closeMissionSelector()">✕</button>
        </div>
        <div class="modal-body">
            <div class="mission-grid" id="missionGrid"></div>
        </div>
    </div>
</div>

<!-- Feedback Modal -->
<div class="modal-overlay feedback-modal" id="feedbackModal">
    <div class="modal" style="max-width:450px;">
        <div style="padding:30px;text-align:center;">
            <div class="feedback-icon" id="fbIcon"></div>
            <div class="feedback-title" id="fbTitle"></div>
            <div class="feedback-text" id="fbText"></div>
            <div>
                <button class="feedback-btn retry" onclick="closeFeedback()">다시 도전</button>
                <button class="feedback-btn next" id="fbNextBtn" onclick="nextMission()">다음 미션 →</button>
            </div>
        </div>
    </div>
</div>

<script>
// ===== AUTH =====
const AUTH_TOKEN = localStorage.getItem('airoom_auth_token') || '';

// ===== STATE =====
let gridSize = 5;
let grid = []; // 2D array: grid[y][x] = '#hex' or null
let currentColor = '#FF0000';
let currentMission = null;
let completedMissions = JSON.parse(localStorage.getItem('pixel_completed') || '[]');
let chatMessages = [];
let isProcessing = false;
let buttonState = { A: false, B: false };
let eventHandlers = { A: null, B: null, SHAKE: null, START: null };
let animationRunning = false;
let animationCancel = false;

const COLORS = ['#FF0000','#FF6600','#FFCC00','#33CC33','#0099FF','#6633FF','#FF33CC','#FFFFFF','#888888','#000000'];

// ===== GRID =====
function initGrid() {
    grid = [];
    for (let y = 0; y < gridSize; y++) {
        grid[y] = [];
        for (let x = 0; x < gridSize; x++) grid[y][x] = null;
    }
    renderGrid();
}

function renderGrid() {
    const el = document.getElementById('ledGrid');
    const cellSize = gridSize <= 5 ? 48 : gridSize <= 8 ? 32 : 20;
    el.style.gridTemplateColumns = `repeat(${gridSize}, ${cellSize}px)`;
    el.innerHTML = '';
    for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
            const cell = document.createElement('div');
            cell.className = 'led-cell' + (grid[y][x] ? ' on' : '');
            cell.style.width = cellSize + 'px';
            cell.style.color = grid[y][x] || '#1a1a1a';
            cell.style.backgroundColor = grid[y][x] || '#1a1a1a';
            cell.dataset.x = x;
            cell.dataset.y = y;
            cell.onmousedown = () => togglePixel(x, y);
            cell.onmouseenter = (e) => { if (e.buttons === 1) setPixel(x, y, currentColor); };
            el.appendChild(cell);
        }
    }
}

function setPixel(x, y, color) {
    if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return;
    grid[y][x] = color;
    updateCell(x, y);
}

function clearPixel(x, y) {
    if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return;
    grid[y][x] = null;
    updateCell(x, y);
}

function togglePixel(x, y) {
    if (grid[y][x]) clearPixel(x, y);
    else setPixel(x, y, currentColor);
}

function updateCell(x, y) {
    const idx = y * gridSize + x;
    const cell = document.getElementById('ledGrid').children[idx];
    if (!cell) return;
    const c = grid[y][x];
    cell.className = 'led-cell' + (c ? ' on' : '');
    cell.style.color = c || '#1a1a1a';
    cell.style.backgroundColor = c || '#1a1a1a';
}

function clearGrid() {
    animationCancel = true;
    for (let y = 0; y < gridSize; y++)
        for (let x = 0; x < gridSize; x++) grid[y][x] = null;
    renderGrid();
}

function setGridSize(size, btn) {
    gridSize = size;
    document.querySelectorAll('.grid-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    initGrid();
}

function getGridState() {
    return grid.map(row => [...row]);
}

// ===== COLOR PALETTE =====
function initPalette() {
    const el = document.getElementById('colorPalette');
    COLORS.forEach(c => {
        const s = document.createElement('div');
        s.className = 'color-swatch' + (c === currentColor ? ' active' : '');
        s.style.backgroundColor = c;
        s.onclick = () => {
            currentColor = c;
            document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('active'));
            s.classList.add('active');
        };
        el.appendChild(s);
    });
}

// ===== VIRTUAL BUTTONS =====
function pressButton(btn) {
    buttonState[btn] = true;
    if (eventHandlers[btn]) {
        executeCommands(eventHandlers[btn]);
    }
}
function releaseButton(btn) { buttonState[btn] = false; }
function triggerShake() {
    // Shake animation on frame
    const frame = document.querySelector('.microbit-frame');
    frame.style.animation = 'shake .4s';
    setTimeout(() => frame.style.animation = '', 400);
    if (eventHandlers.SHAKE) executeCommands(eventHandlers.SHAKE);
}

// ===== DSL PARSER =====
function parseDSL(text) {
    if (!text || !text.trim()) return [];
    const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('//'));
    const commands = [];
    let i = 0;
    function parseBlock() {
        const cmds = [];
        while (i < lines.length) {
            const line = lines[i];
            if (line === '}') { i++; return cmds; }
            // REPEAT
            let m = line.match(/^REPEAT\s+(\d+)\s*\{?$/);
            if (m) { i++; if (!line.endsWith('{') && i < lines.length && lines[i] === '{') i++;
                const body = parseBlock(); cmds.push({ type:'REPEAT', count:parseInt(m[1]), body }); continue; }
            // ON events
            m = line.match(/^ON_(BUTTON_A|BUTTON_B|SHAKE|START)\s*\{?$/);
            if (m) { i++; if (!line.endsWith('{') && i < lines.length && lines[i] === '{') i++;
                const body = parseBlock(); cmds.push({ type:'ON_'+m[1], body }); continue; }
            // IF conditions
            m = line.match(/^IF\s+(BUTTON_A|BUTTON_B|BUTTON_A_AND_B)\s*\{?$/);
            if (m) { i++; if (!line.endsWith('{') && i < lines.length && lines[i] === '{') i++;
                const body = parseBlock();
                let elseBody = null;
                if (i < lines.length && lines[i].match(/^ELSE\s*\{?$/)) {
                    i++; if (i < lines.length && lines[i] === '{') i++;
                    elseBody = parseBlock();
                }
                cmds.push({ type:'IF', condition:m[1], body, elseBody }); continue; }
            // IF comparison: IF x op y
            m = line.match(/^IF\s+(\w+)\s*(==|!=|<|>|<=|>=)\s*(\w+)\s*\{?$/);
            if (m) { i++; if (!line.endsWith('{') && i < lines.length && lines[i] === '{') i++;
                const body = parseBlock();
                let elseBody = null;
                if (i < lines.length && lines[i].match(/^ELSE\s*\{?$/)) {
                    i++; if (i < lines.length && lines[i] === '{') i++;
                    elseBody = parseBlock();
                }
                cmds.push({ type:'IF_CMP', left:m[1], op:m[2], right:m[3], body, elseBody }); continue; }
            // ELSE standalone (shouldn't happen if parsed above)
            if (line.match(/^ELSE\s*\{?$/)) { i++; continue; }
            // LED commands
            m = line.match(/^LED_ON\s+(\d+)\s+(\d+)$/);
            if (m) { cmds.push({ type:'LED_ON', x:parseInt(m[1]), y:parseInt(m[2]) }); i++; continue; }
            m = line.match(/^LED_OFF\s+(\d+)\s+(\d+)$/);
            if (m) { cmds.push({ type:'LED_OFF', x:parseInt(m[1]), y:parseInt(m[2]) }); i++; continue; }
            m = line.match(/^LED_COLOR\s+(\d+)\s+(\d+)\s+(#[0-9A-Fa-f]{6})$/);
            if (m) { cmds.push({ type:'LED_COLOR', x:parseInt(m[1]), y:parseInt(m[2]), color:m[3] }); i++; continue; }
            m = line.match(/^LED_TOGGLE\s+(\d+)\s+(\d+)$/);
            if (m) { cmds.push({ type:'LED_TOGGLE', x:parseInt(m[1]), y:parseInt(m[2]) }); i++; continue; }
            m = line.match(/^FILL_ALL\s+(#[0-9A-Fa-f]{6})$/);
            if (m) { cmds.push({ type:'FILL_ALL', color:m[1] }); i++; continue; }
            m = line.match(/^FILL_ROW\s+(\d+)\s+(#[0-9A-Fa-f]{6})$/);
            if (m) { cmds.push({ type:'FILL_ROW', y:parseInt(m[1]), color:m[2] }); i++; continue; }
            m = line.match(/^FILL_COL\s+(\d+)\s+(#[0-9A-Fa-f]{6})$/);
            if (m) { cmds.push({ type:'FILL_COL', x:parseInt(m[1]), color:m[2] }); i++; continue; }
            if (line === 'CLEAR_ALL') { cmds.push({ type:'CLEAR_ALL' }); i++; continue; }
            m = line.match(/^WAIT\s+(\d+)$/);
            if (m) { cmds.push({ type:'WAIT', ms:parseInt(m[1]) }); i++; continue; }
            m = line.match(/^SET_BRIGHTNESS\s+(\d+)$/);
            if (m) { cmds.push({ type:'SET_BRIGHTNESS', level:parseInt(m[1]) }); i++; continue; }
            m = line.match(/^SHOW_ICON\s+(\w+)$/);
            if (m) { cmds.push({ type:'SHOW_ICON', name:m[1] }); i++; continue; }
            // FOR loop: FOR x 0 4 { ... }
            m = line.match(/^FOR\s+(\w+)\s+(\d+)\s+(\d+)\s*\{?$/);
            if (m) { i++; if (!line.endsWith('{') && i < lines.length && lines[i] === '{') i++;
                const body = parseBlock(); cmds.push({ type:'FOR', var:m[1], from:parseInt(m[2]), to:parseInt(m[3]), body }); continue; }
            i++; // skip unknown
        }
        return cmds;
    }
    return parseBlock();
}

// ===== EXECUTE COMMANDS =====
async function executeCommands(commands) {
    for (const cmd of commands) {
        if (animationCancel) return;
        switch (cmd.type) {
            case 'LED_ON': setPixel(cmd.x, cmd.y, currentColor); break;
            case 'LED_OFF': clearPixel(cmd.x, cmd.y); break;
            case 'LED_COLOR': setPixel(cmd.x, cmd.y, cmd.color); break;
            case 'LED_TOGGLE': if (grid[cmd.y]?.[cmd.x]) clearPixel(cmd.x,cmd.y); else setPixel(cmd.x,cmd.y,currentColor); break;
            case 'FILL_ALL':
                for (let y=0;y<gridSize;y++) for (let x=0;x<gridSize;x++) grid[y][x]=cmd.color;
                renderGrid(); break;
            case 'FILL_ROW':
                for (let x=0;x<gridSize;x++) grid[cmd.y][x]=cmd.color;
                renderGrid(); break;
            case 'FILL_COL':
                for (let y=0;y<gridSize;y++) grid[y][cmd.x]=cmd.color;
                renderGrid(); break;
            case 'CLEAR_ALL': clearGrid(); break;
            case 'WAIT': await new Promise(r => setTimeout(r, cmd.ms)); break;
            case 'SHOW_ICON': showIcon(cmd.name); break;
            case 'REPEAT':
                for (let r=0;r<cmd.count;r++) await executeCommands(cmd.body);
                break;
            case 'FOR': {
                const varName = cmd.var;
                for (let v=cmd.from;v<=cmd.to;v++) {
                    // Replace variable references in body (simple approach)
                    const resolved = resolveVar(cmd.body, varName, v);
                    await executeCommands(resolved);
                }
                break;
            }
            case 'ON_BUTTON_A': eventHandlers.A = cmd.body; break;
            case 'ON_BUTTON_B': eventHandlers.B = cmd.body; break;
            case 'ON_SHAKE': eventHandlers.SHAKE = cmd.body; break;
            case 'ON_START': await executeCommands(cmd.body); break;
            case 'IF':
                if ((cmd.condition === 'BUTTON_A' && buttonState.A) ||
                    (cmd.condition === 'BUTTON_B' && buttonState.B) ||
                    (cmd.condition === 'BUTTON_A_AND_B' && buttonState.A && buttonState.B))
                    await executeCommands(cmd.body);
                else if (cmd.elseBody) await executeCommands(cmd.elseBody);
                break;
            case 'IF_CMP': {
                const l = isNaN(cmd.left) ? 0 : parseInt(cmd.left);
                const r = isNaN(cmd.right) ? 0 : parseInt(cmd.right);
                let result = false;
                switch(cmd.op) {
                    case '==': result = l===r; break; case '!=': result = l!==r; break;
                    case '<': result = l<r; break; case '>': result = l>r; break;
                    case '<=': result = l<=r; break; case '>=': result = l>=r; break;
                }
                if (result) await executeCommands(cmd.body);
                else if (cmd.elseBody) await executeCommands(cmd.elseBody);
                break;
            }
        }
    }
}

function resolveVar(commands, varName, value) {
    return commands.map(cmd => {
        const c = { ...cmd };
        if (c.x !== undefined && String(c.x) === varName) c.x = value;
        if (c.y !== undefined && String(c.y) === varName) c.y = value;
        if (c.body) c.body = resolveVar(c.body, varName, value);
        if (c.elseBody) c.elseBody = resolveVar(c.elseBody, varName, value);
        return c;
    });
}

// ===== BLOCKLY <-> DSL =====
function workspaceToDSL() {
    const topBlocks = workspace.getTopBlocks(true);
    let dsl = '';
    function blockToDSL(block, indent) {
        const p = '  '.repeat(indent);
        let r = '';
        while (block) {
            const t = block.type;
            if (t==='pixel_led_on') r+=p+'LED_ON '+block.getFieldValue('X')+' '+block.getFieldValue('Y')+'\n';
            else if (t==='pixel_led_off') r+=p+'LED_OFF '+block.getFieldValue('X')+' '+block.getFieldValue('Y')+'\n';
            else if (t==='pixel_led_color') r+=p+'LED_COLOR '+block.getFieldValue('X')+' '+block.getFieldValue('Y')+' '+block.getFieldValue('COLOR')+'\n';
            else if (t==='pixel_led_toggle') r+=p+'LED_TOGGLE '+block.getFieldValue('X')+' '+block.getFieldValue('Y')+'\n';
            else if (t==='pixel_fill_all') r+=p+'FILL_ALL '+block.getFieldValue('COLOR')+'\n';
            else if (t==='pixel_fill_row') r+=p+'FILL_ROW '+block.getFieldValue('Y')+' '+block.getFieldValue('COLOR')+'\n';
            else if (t==='pixel_fill_col') r+=p+'FILL_COL '+block.getFieldValue('X')+' '+block.getFieldValue('COLOR')+'\n';
            else if (t==='pixel_clear') r+=p+'CLEAR_ALL\n';
            else if (t==='pixel_show_icon') r+=p+'SHOW_ICON '+block.getFieldValue('ICON')+'\n';
            else if (t==='pixel_wait') r+=p+'WAIT '+block.getFieldValue('MS')+'\n';
            else if (t==='pixel_repeat') {
                r+=p+'REPEAT '+block.getFieldValue('TIMES')+' {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
            }
            else if (t==='pixel_for_xy') {
                r+=p+'FOR '+block.getFieldValue('VAR')+' '+block.getFieldValue('FROM')+' '+block.getFieldValue('TO')+' {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
            }
            else if (t==='pixel_on_button') {
                const btn=block.getFieldValue('BTN');
                r+=p+'ON_BUTTON_'+btn+' {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
            }
            else if (t==='pixel_on_shake') {
                r+=p+'ON_SHAKE {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
            }
            else if (t==='pixel_on_start') {
                r+=p+'ON_START {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
            }
            else if (t==='pixel_if_button') {
                r+=p+'IF '+block.getFieldValue('BTN')+' {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
                const elseInner=block.getInputTargetBlock('ELSE');
                if(elseInner){r+=p+'ELSE {\n'; r+=blockToDSL(elseInner,indent+1); r+=p+'}\n';}
            }
            else if (t==='pixel_if_compare') {
                r+=p+'IF '+block.getFieldValue('LEFT')+' '+block.getFieldValue('OP')+' '+block.getFieldValue('RIGHT')+' {\n';
                const inner=block.getInputTargetBlock('DO'); if(inner) r+=blockToDSL(inner,indent+1);
                r+=p+'}\n';
                const elseInner=block.getInputTargetBlock('ELSE');
                if(elseInner){r+=p+'ELSE {\n'; r+=blockToDSL(elseInner,indent+1); r+=p+'}\n';}
            }
            block = block.getNextBlock();
        }
        return r;
    }
    for (const block of topBlocks) dsl += blockToDSL(block, 0);
    return dsl.trim();
}

function dslToWorkspace(dslText) {
    workspace.clear();
    const commands = parseDSL(dslText);
    if (!commands.length) return;
    function createBlocks(cmds, parentConn) {
        let prev = null;
        for (const cmd of cmds) {
            let block;
            switch(cmd.type) {
                case 'LED_ON': block=workspace.newBlock('pixel_led_on'); block.setFieldValue(cmd.x,'X'); block.setFieldValue(cmd.y,'Y'); break;
                case 'LED_OFF': block=workspace.newBlock('pixel_led_off'); block.setFieldValue(cmd.x,'X'); block.setFieldValue(cmd.y,'Y'); break;
                case 'LED_COLOR': block=workspace.newBlock('pixel_led_color'); block.setFieldValue(cmd.x,'X'); block.setFieldValue(cmd.y,'Y'); block.setFieldValue(cmd.color,'COLOR'); break;
                case 'LED_TOGGLE': block=workspace.newBlock('pixel_led_toggle'); block.setFieldValue(cmd.x,'X'); block.setFieldValue(cmd.y,'Y'); break;
                case 'FILL_ALL': block=workspace.newBlock('pixel_fill_all'); block.setFieldValue(cmd.color,'COLOR'); break;
                case 'FILL_ROW': block=workspace.newBlock('pixel_fill_row'); block.setFieldValue(cmd.y,'Y'); block.setFieldValue(cmd.color,'COLOR'); break;
                case 'FILL_COL': block=workspace.newBlock('pixel_fill_col'); block.setFieldValue(cmd.x,'X'); block.setFieldValue(cmd.color,'COLOR'); break;
                case 'CLEAR_ALL': block=workspace.newBlock('pixel_clear'); break;
                case 'SHOW_ICON': block=workspace.newBlock('pixel_show_icon'); block.setFieldValue(cmd.name,'ICON'); break;
                case 'WAIT': block=workspace.newBlock('pixel_wait'); block.setFieldValue(cmd.ms,'MS'); break;
                case 'REPEAT':
                    block=workspace.newBlock('pixel_repeat'); block.setFieldValue(cmd.count,'TIMES');
                    block.initSvg(); block.render();
                    if(cmd.body?.length) createBlocks(cmd.body, block.getInput('DO').connection);
                    break;
                case 'FOR':
                    block=workspace.newBlock('pixel_for_xy'); block.setFieldValue(cmd.var,'VAR'); block.setFieldValue(cmd.from,'FROM'); block.setFieldValue(cmd.to,'TO');
                    block.initSvg(); block.render();
                    if(cmd.body?.length) createBlocks(cmd.body, block.getInput('DO').connection);
                    break;
                case 'ON_BUTTON_A': case 'ON_BUTTON_B':
                    block=workspace.newBlock('pixel_on_button'); block.setFieldValue(cmd.type.replace('ON_BUTTON_',''),'BTN');
                    block.initSvg(); block.render();
                    if(cmd.body?.length) createBlocks(cmd.body, block.getInput('DO').connection);
                    break;
                case 'ON_SHAKE':
                    block=workspace.newBlock('pixel_on_shake');
                    block.initSvg(); block.render();
                    if(cmd.body?.length) createBlocks(cmd.body, block.getInput('DO').connection);
                    break;
                case 'ON_START':
                    block=workspace.newBlock('pixel_on_start');
                    block.initSvg(); block.render();
                    if(cmd.body?.length) createBlocks(cmd.body, block.getInput('DO').connection);
                    break;
                case 'IF':
                    block=workspace.newBlock('pixel_if_button'); block.setFieldValue(cmd.condition,'BTN');
                    block.initSvg(); block.render();
                    if(cmd.body?.length) createBlocks(cmd.body, block.getInput('DO').connection);
                    if(cmd.elseBody?.length) createBlocks(cmd.elseBody, block.getInput('ELSE').connection);
                    break;
                default: continue;
            }
            if (!block) continue;
            block.initSvg(); block.render();
            if (parentConn && !prev) parentConn.connect(block.previousConnection);
            else if (prev && prev.nextConnection && block.previousConnection) prev.nextConnection.connect(block.previousConnection);
            prev = block;
        }
    }
    createBlocks(commands, null);
    const topBlocks = workspace.getTopBlocks(true);
    if (topBlocks.length) topBlocks[0].moveBy(30, 30);
    workspace.render();
}

// ===== RUN =====
async function runCode() {
    animationCancel = false;
    eventHandlers = { A:null, B:null, SHAKE:null, START:null };
    const dsl = workspaceToDSL();
    if (!dsl) { addChatMsg('system','블록이 비어있어요! 블록을 조합하거나 AI에게 요청해 보세요.'); return; }
    clearGrid();
    const cmds = parseDSL(dsl);
    animationRunning = true;
    await executeCommands(cmds);
    animationRunning = false;
    if (currentMission && currentMission.targetGrid) checkMission();
}

function clearWorkspace() { workspace.clear(); updateDSLPreview(); }

// ===== CHAT / API =====
function addChatMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.innerHTML = text.replace(/\n/g, '<br>');
    document.getElementById('chatHistory').appendChild(div);
    document.getElementById('chatHistory').scrollTop = 999999;
}

const SYSTEM_PROMPT = `너는 마이크로비트 픽셀 아트 코딩 도우미야.
아이가 LED 디스플레이에 그리고 싶은 그림이나 패턴을 설명하면,
아래 DSL 명령어만 사용해서 코드를 생성해.

사용 가능한 명령어:
LED_ON x y, LED_OFF x y, LED_COLOR x y #hex, LED_TOGGLE x y,
FILL_ALL #hex, FILL_ROW y #hex, FILL_COL x #hex, CLEAR_ALL,
SHOW_ICON name (HEART, SMILEY, SAD, ARROW_UP, ARROW_DOWN, ARROW_LEFT, ARROW_RIGHT, CHECK, X, DIAMOND, SQUARE),
REPEAT n { ... }, FOR var from to { ... },
ON_BUTTON_A { ... }, ON_BUTTON_B { ... }, ON_SHAKE { ... }, ON_START { ... },
IF BUTTON_A { ... } ELSE { ... }, IF BUTTON_B { ... },
WAIT ms

규칙:
1. DSL 코드만 출력할 것. 설명이나 인사말 금지.
2. 마크다운 코드블록(\`\`\`) 사용 금지.
3. 각 명령어는 한 줄에 하나씩 작성.
4. 기본 그리드는 5x5 (x: 0-4, y: 0-4).
5. 색상은 #RRGGBB 형식.
6. 중괄호는 반드시 짝을 맞출 것.`;

async function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isProcessing) return;
    input.value = '';
    addChatMsg('user', text);
    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'chat-msg ai';
    loadingDiv.innerHTML = '<span class="loading"></span> 생각하고 있어요...';
    document.getElementById('chatHistory').appendChild(loadingDiv);
    document.getElementById('chatHistory').scrollTop = 999999;

    try {
        const messages = [
            { role:'system', content:SYSTEM_PROMPT },
            ...chatMessages.slice(-6),
            { role:'user', content:text }
        ];
        const res = await fetch('/api/ai/chat', {
            method:'POST',
            headers:{'Content-Type':'application/json','X-Auth-Token':AUTH_TOKEN},
            body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,temperature:0.5,max_tokens:1024})
        });
        const data = await res.json();
        loadingDiv.remove();

        if (!res.ok) {
            addChatMsg('system','⚠️ AI 호출 실패: '+(data?.error?.message||data?.error||'알 수 없는 오류'));
            return;
        }

        let reply = data.choices?.[0]?.message?.content || '';
        reply = reply.replace(/```[a-z]*\n?/g,'').replace(/```/g,'').trim();

        chatMessages.push({role:'user',content:text});
        chatMessages.push({role:'assistant',content:reply});

        const isDSL = /^(LED_ON|LED_OFF|LED_COLOR|LED_TOGGLE|FILL_|CLEAR_ALL|SHOW_ICON|REPEAT|ON_|IF |FOR |WAIT)/m.test(reply);

        if (isDSL) {
            addChatMsg('ai','🎨 코드를 만들었어요!\n\n'+reply);
            try {
                dslToWorkspace(reply);
                updateDSLPreview();
                clearGrid();
                const cmds = parseDSL(reply);
                animationCancel = false;
                await executeCommands(cmds);
                if (currentMission && currentMission.targetGrid) checkMission();
            } catch(e) {
                addChatMsg('system','⚠️ 코드 실행 중 문제가 생겼어요.');
            }
        } else {
            addChatMsg('ai', reply);
        }
    } catch(e) {
        loadingDiv.remove();
        addChatMsg('system','⚠️ 네트워크 오류: '+e.message);
    } finally {
        isProcessing = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

function requestHint() {

}

function openMissionSelector() {
    const grid = document.getElementById('missionGrid');
    grid.innerHTML = '';
    for (const m of MISSIONS) {
        const done = completedMissions.includes(m.id);
        const card = document.createElement('div');
        card.className = 'mission-card'+(done?' completed':'');
        card.innerHTML = `
            <span class="m-level" style="background:${m.levelColor}30;color:${m.levelColor}">${m.level}</span>
            <div class="m-title">${m.title}</div>
            <div class="m-desc">${m.description}</div>
            ${done?'<span class="m-check">✅</span>':''}
        `;
        card.onclick = () => selectMission(m);
        grid.appendChild(card);
    }
    document.getElementById('missionModal').classList.add('show');
}

function closeMissionSelector() { document.getElementById('missionModal').classList.remove('show'); }

function selectMission(m) {
    currentMission = m;
    document.getElementById('levelBadge').textContent = m.level;
    document.getElementById('levelBadge').style.background = m.levelColor;
    document.getElementById('missionBadge').textContent = `미션 ${m.id}: ${m.title}`;
    closeMissionSelector();
    clearWorkspace();
    clearGrid();
    chatMessages = [];
    document.getElementById('chatHistory').innerHTML = '';
    addChatMsg('system',`🎯 미션 ${m.id}: ${m.title}`);
    addChatMsg('system', m.description);
    if (m.targetGrid) addChatMsg('system','💡 목표 패턴을 확인하고, AI에게 설명하거나 블록을 조합해 보세요!');
    else addChatMsg('system','자연어로 AI에게 설명하거나 블록을 직접 조합해 보세요!');
}

function checkMission() {
    if (!currentMission || !currentMission.targetGrid) return;
    const target = currentMission.targetGrid;
    let match = 0, total = 0;
    for (let y = 0; y < Math.min(gridSize, target.length); y++) {
        for (let x = 0; x < Math.min(gridSize, target[y].length); x++) {
            total++;
            const tOn = !!target[y][x];
            const gOn = !!grid[y]?.[x];
            if (tOn === gOn) match++;
        }
    }
    const similarity = total > 0 ? match / total : 0;
    if (similarity >= 0.9) {
        if (!completedMissions.includes(currentMission.id)) {
            completedMissions.push(currentMission.id);
            localStorage.setItem('pixel_completed', JSON.stringify(completedMissions));
        }
        showFeedback(true,'🎉 미션 성공!','와! 정확해요! 멋진 픽셀 아트를 완성했어요!');
        addChatMsg('success','🎉 미션 성공! 축하해요!');
    } else if (similarity >= 0.7) {
        showFeedback(false,'거의 다 됐어요! 💪','조금만 더 수정하면 완성할 수 있어요! ('+Math.round(similarity*100)+'% 일치)');
    } else {
        addChatMsg('system','🤔 목표 패턴과 '+ Math.round(similarity*100) +'% 일치해요. 힌트를 확인해 보세요!');
    }
}

function showFeedback(success, title, text) {
    document.getElementById('fbIcon').textContent = success ? '🎉' : '💪';
    document.getElementById('fbTitle').textContent = title;
    document.getElementById('fbText').textContent = text;
    document.getElementById('fbNextBtn').style.display = success ? '' : 'none';
    document.getElementById('feedbackModal').classList.add('show');
}

function closeFeedback() { document.getElementById('feedbackModal').classList.remove('show'); }

function nextMission() {
    closeFeedback();
    if (!currentMission) return;
    const idx = MISSIONS.findIndex(m => m.id === currentMission.id) + 1;
    if (idx < MISSIONS.length) selectMission(MISSIONS[idx]);
    else addChatMsg('success','🏆 모든 미션을 완료했어요! 대단해요!');
}
