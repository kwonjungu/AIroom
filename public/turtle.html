<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 터틀 바이브 코딩</title>
<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly/msg/ko.js"></script>
<style>
:root{--primary:#4A90D9;--primary-dark:#357ABD;--accent:#FF6B6B;--success:#51CF66;--bg:#F0F4F8;--card:#fff;--text:#2D3748;--text-light:#718096;--border:#E2E8F0;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Header */
.app-header{background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15);flex-shrink:0;}
.app-header h1{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;}
.header-center{display:flex;align-items:center;gap:12px;}
.mission-badge{background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.level-badge{background:rgba(255,255,255,.3);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.header-actions{display:flex;gap:8px;}
.hdr-btn{padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.3);}

/* Main 3-panel */
.main-layout{flex:1;display:flex;gap:0;overflow:hidden;min-height:0;}
.panel{display:flex;flex-direction:column;overflow:hidden;background:var(--card);border-right:1px solid var(--border);}
.panel:last-child{border-right:none;}
.panel-header{padding:10px 14px;background:#f8fafb;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}
.panel-body{flex:1;overflow:auto;position:relative;min-height:0;}

/* Left: Turtle Canvas */
.turtle-panel{flex:0 0 35%;min-width:280px;}
.canvas-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a2e;overflow:hidden;}
#turtleCanvas{background:#1a1a2e;border:none;display:block;}
.canvas-controls{display:flex;gap:6px;flex-wrap:wrap;}
.ctrl-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.ctrl-btn:hover{border-color:var(--primary);color:var(--primary);}
.ctrl-btn.run{background:var(--primary);color:#fff;border-color:var(--primary);}
.ctrl-btn.run:hover{background:var(--primary-dark);}
.ctrl-btn.demo{background:#FF9800;color:#fff;border-color:#FF9800;}
.tab-switch{display:flex;gap:4px;}
.tab-btn{padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:11px;font-weight:600;}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* Center: Blockly */
.blockly-panel{flex:0 0 35%;min-width:280px;}
#blocklyDiv{width:100%;height:100%;}
.dsl-preview{padding:8px 12px;background:#f5f5f5;border-top:1px solid var(--border);font-family:'Consolas','Courier New',monospace;font-size:11px;color:#555;max-height:80px;overflow-y:auto;white-space:pre;flex-shrink:0;}

/* Right: Chat */
.chat-panel{flex:1;min-width:250px;}
.chat-history{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.chat-msg{max-width:90%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.chat-msg.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px;}
.chat-msg.ai{align-self:flex-start;background:#f0f0f0;color:var(--text);border-bottom-left-radius:4px;}
.chat-msg.system{align-self:center;background:#fff3e0;color:#e65100;font-size:12px;text-align:center;border-radius:10px;}
.chat-msg.success{align-self:center;background:#e8f5e9;color:#2e7d32;font-size:13px;font-weight:700;text-align:center;}
.chat-input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:#fafafa;}
.chat-input-area input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;}
.chat-input-area input:focus{border-color:var(--primary);}
.send-btn{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:background .15s;}
.send-btn:hover{background:var(--primary-dark);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}
.hint-btn{padding:8px 12px;border:1px solid #FFA726;background:#FFF3E0;color:#E65100;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}
.hint-btn:hover{background:#FFE0B2;}

/* Mission Selector Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:20px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:20px;font-weight:800;}
.modal-close{width:36px;height:36px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px 24px;}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.mission-card{padding:16px;border-radius:14px;border:2px solid var(--border);cursor:pointer;transition:all .2s;position:relative;}
.mission-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.mission-card.completed{border-color:var(--success);background:#f0fff4;}
.mission-card .m-level{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:6px;}
.mission-card .m-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.mission-card .m-desc{font-size:12px;color:var(--text-light);}
.mission-card .m-check{position:absolute;top:10px;right:10px;font-size:18px;}

/* Feedback Modal */
.feedback-modal .modal{max-width:450px;text-align:center;padding:30px;}
.feedback-icon{font-size:64px;margin-bottom:12px;}
.feedback-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.feedback-text{font-size:14px;color:var(--text-light);margin-bottom:20px;line-height:1.6;}
.feedback-btn{padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;transition:all .15s;}
.feedback-btn.next{background:var(--primary);color:#fff;}
.feedback-btn.next:hover{background:var(--primary-dark);}
.feedback-btn.retry{background:#f0f0f0;color:var(--text);margin-right:8px;}

/* Loading spinner */
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.1);border-left-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:900px){
    .main-layout{flex-direction:column;}
    .panel{flex:none!important;min-width:0!important;border-right:none;border-bottom:1px solid var(--border);}
    .turtle-panel,.blockly-panel{height:35vh;}
    .chat-panel{height:30vh;}
}
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
    <h1>🐢 터틀 바이브 코딩</h1>
    <div class="header-center">
        <span class="level-badge" id="levelBadge">기초</span>
        <span class="mission-badge" id="missionBadge">미션을 선택하세요</span>
    </div>
    <div class="header-actions">
        <button class="hdr-btn" onclick="openMissionSelector()">📋 미션 선택</button>
        <button class="hdr-btn" onclick="location.href='/'">← 돌아가기</button>
    </div>
</div>

<!-- Main 3-Panel Layout -->
<div class="main-layout">
    <!-- Left: Turtle Canvas -->
    <div class="panel turtle-panel">
        <div class="panel-header">
            <h3>🐢 터틀 캔버스</h3>
            <div style="display:flex;gap:6px;align-items:center;">
                <div class="tab-switch">
                    <button class="tab-btn active" onclick="switchCanvasTab('run',this)">실행</button>
                    <button class="tab-btn" onclick="switchCanvasTab('target',this)">목표</button>
                </div>
                <div class="canvas-controls">
                    <button class="ctrl-btn run" onclick="runCode()">▶ 실행</button>
                    <button class="ctrl-btn demo" onclick="showDemo()">👀 시연</button>
                    <button class="ctrl-btn" onclick="resetCanvas()">🔄 초기화</button>
                </div>
            </div>
        </div>
        <div class="panel-body">
            <div class="canvas-wrap">
                <canvas id="turtleCanvas" width="500" height="400"></canvas>
            </div>
        </div>
    </div>

    <!-- Center: Blockly -->
    <div class="panel blockly-panel">
        <div class="panel-header">
            <h3>🧩 블록 코딩</h3>
            <button class="ctrl-btn" onclick="clearWorkspace()" style="font-size:11px;">🗑 블록 초기화</button>
        </div>
        <div class="panel-body">
            <div id="blocklyDiv"></div>
        </div>
        <div class="dsl-preview" id="dslPreview">// 블록을 조합하면 여기에 DSL 코드가 표시됩니다</div>
    </div>

    <!-- Right: Chat -->
    <div class="panel chat-panel">
        <div class="panel-header">
            <h3>💬 AI 도우미</h3>
            <button class="hint-btn" onclick="requestHint()">💡 힌트</button>
        </div>
        <div class="chat-history" id="chatHistory">
            <div class="chat-msg system">🐢 안녕! 나는 터틀 코딩 도우미야.<br>거북이가 어떻게 움직이면 좋을지 말해줘!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="예: 앞으로 100 가고 오른쪽으로 90도 돌아" onkeydown="if(event.key==='Enter')sendChat()">
            <button class="send-btn" id="sendBtn" onclick="sendChat()">전송</button>
        </div>
    </div>
</div>

<!-- Mission Selector Modal -->
<div class="modal-overlay" id="missionModal">
    <div class="modal">
        <div class="modal-header">
            <h2>📋 미션 선택</h2>
            <button class="modal-close" onclick="closeMissionSelector()">✕</button>
        </div>
        <div class="modal-body">
            <div class="mission-grid" id="missionGrid"></div>
        </div>
    </div>
</div>

<!-- Feedback Modal -->
<div class="modal-overlay feedback-modal" id="feedbackModal">
    <div class="modal" style="max-width:450px;">
        <div style="padding:30px;text-align:center;">
            <div class="feedback-icon" id="fbIcon"></div>
            <div class="feedback-title" id="fbTitle"></div>
            <div class="feedback-text" id="fbText"></div>
            <div>
                <button class="feedback-btn retry" onclick="closeFeedback()">다시 도전</button>
                <button class="feedback-btn next" id="fbNextBtn" onclick="nextMission()">다음 미션 →</button>
            </div>
        </div>
    </div>
</div>

<script>
// ===== AUTH =====
const AUTH_TOKEN = localStorage.getItem('airoom_auth_token') || '';

// ===== MISSIONS DATA =====
const MISSIONS = [
    {id:1,title:'직선 그리기',level:'기초',levelColor:'#4CAF50',
     description:'거북이를 앞으로 100픽셀 보내보세요!',
     hint:'\"앞으로 100 가줘\"라고 말해보세요.',
     targetDSL:'FORWARD 100',tolerance:15},
    {id:2,title:'ㄱ자 그리기',level:'기초',levelColor:'#4CAF50',
     description:'앞으로 가다가 오른쪽으로 꺾어보세요!',
     hint:'앞으로 간 다음, 오른쪽으로 90도 돌고 다시 앞으로 가면 돼요.',
     targetDSL:'FORWARD 100\nRIGHT 90\nFORWARD 100',tolerance:15},
    {id:3,title:'삼각형',level:'도형',levelColor:'#2196F3',
     description:'거북이가 삼각형을 그려요!',
     hint:'앞으로 가고 오른쪽 120도 돌기를 3번 반복하면 삼각형이 돼요.',
     targetDSL:'REPEAT 3 {\nFORWARD 100\nRIGHT 120\n}',tolerance:15},
    {id:4,title:'사각형',level:'도형',levelColor:'#2196F3',
     description:'거북이가 정사각형을 그려요!',
     hint:'같은 동작을 4번 반복해 보세요.',
     targetDSL:'REPEAT 4 {\nFORWARD 100\nRIGHT 90\n}',tolerance:15},
    {id:5,title:'오각형',level:'도형',levelColor:'#2196F3',
     description:'거북이가 오각형을 그려요!',
     hint:'5번 반복, 72도씩 돌면 오각형이 만들어져요.',
     targetDSL:'REPEAT 5 {\nFORWARD 80\nRIGHT 72\n}',tolerance:15},
    {id:6,title:'색깔 삼각형',level:'색상',levelColor:'#9C27B0',
     description:'빨간색 굵은 선으로 삼각형을 그려보세요!',
     hint:'펜 색을 빨간색으로, 굵기를 3으로 바꾼 뒤 삼각형을 그려요.',
     targetDSL:'PEN_COLOR #FF0000\nPEN_SIZE 3\nREPEAT 3 {\nFORWARD 100\nRIGHT 120\n}',tolerance:15},
    {id:7,title:'별 그리기',level:'패턴',levelColor:'#FF9800',
     description:'멋진 별을 그려보세요! ⭐',
     hint:'5번 반복하면서 앞으로 120, 오른쪽 144도 돌면 별이 돼요.',
     targetDSL:'REPEAT 5 {\nFORWARD 120\nRIGHT 144\n}',tolerance:15},
    {id:8,title:'집 그리기',level:'복합',levelColor:'#F44336',
     description:'사각형 위에 삼각형 지붕을 얹어 집을 만들어요! 🏠',
     hint:'사각형을 먼저 그리고, 위치를 맞춰 삼각형 지붕을 그려보세요.',
     targetDSL:'REPEAT 4 {\nFORWARD 100\nRIGHT 90\n}\nRIGHT 30\nREPEAT 3 {\nFORWARD 100\nRIGHT 120\n}',tolerance:20},
    {id:9,title:'자유 창작',level:'자유',levelColor:'#607D8B',
     description:'마음대로 그려보세요! 🎨 AI에게 무엇이든 요청해봐요.',
     hint:'원하는 모양을 자유롭게 설명해 보세요!',
     targetDSL:'',tolerance:0}
];

let currentMission = null;
let completedMissions = JSON.parse(localStorage.getItem('turtle_completed') || '[]');
let canvasTab = 'run'; // 'run' | 'target'
let chatMessages = [];
let isProcessing = false;

// ===== DSL PARSER =====
function parseDSL(text) {
    if (!text || !text.trim()) return [];
    const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
    const commands = [];
    let i = 0;
    function parseBlock() {
        const cmds = [];
        while (i < lines.length) {
            const line = lines[i];
            if (line === '}') { i++; return cmds; }
            const repeatMatch = line.match(/^REPEAT\s+(\d+)\s*\{?$/);
            if (repeatMatch) {
                i++;
                if (line.endsWith('{')) {
                    const body = parseBlock();
                    cmds.push({ type: 'REPEAT', count: parseInt(repeatMatch[1]), body });
                } else if (i < lines.length && lines[i].trim() === '{') {
                    i++;
                    const body = parseBlock();
                    cmds.push({ type: 'REPEAT', count: parseInt(repeatMatch[1]), body });
                }
                continue;
            }
            const m = line.match(/^(FORWARD|BACKWARD|RIGHT|LEFT|PEN_UP|PEN_DOWN|PEN_COLOR|PEN_SIZE|HOME|CLEAR)\s*(.*)$/);
            if (m) {
                const cmd = { type: m[1] };
                const arg = m[2].trim();
                if (['FORWARD','BACKWARD','RIGHT','LEFT','PEN_SIZE'].includes(m[1])) cmd.value = parseFloat(arg) || 0;
                if (m[1] === 'PEN_COLOR') cmd.value = arg || '#000000';
                cmds.push(cmd);
            }
            i++;
        }
        return cmds;
    }
    const result = parseBlock();
    return result;
}

function commandsToPath(commands) {
    let x = 0, y = 0, angle = 0, penDown = true;
    const path = [{ x, y }];
    function exec(cmds) {
        for (const cmd of cmds) {
            if (cmd.type === 'FORWARD') {
                const rad = (angle - 90) * Math.PI / 180;
                x += cmd.value * Math.cos(rad);
                y += cmd.value * Math.sin(rad);
                if (penDown) path.push({ x, y });
                else path.push({ x, y, penUp: true });
            } else if (cmd.type === 'BACKWARD') {
                const rad = (angle - 90) * Math.PI / 180;
                x -= cmd.value * Math.cos(rad);
                y -= cmd.value * Math.sin(rad);
                if (penDown) path.push({ x, y });
                else path.push({ x, y, penUp: true });
            } else if (cmd.type === 'RIGHT') { angle += cmd.value; }
            else if (cmd.type === 'LEFT') { angle -= cmd.value; }
            else if (cmd.type === 'PEN_UP') { penDown = false; }
            else if (cmd.type === 'PEN_DOWN') { penDown = true; }
            else if (cmd.type === 'HOME') { x = 0; y = 0; angle = 0; }
            else if (cmd.type === 'REPEAT') {
                for (let r = 0; r < cmd.count; r++) exec(cmd.body);
            }
        }
    }
    exec(commands);
    return path;
}

// ===== TURTLE ENGINE =====
const canvas = document.getElementById('turtleCanvas');
const ctx = canvas.getContext('2d');
let turtleState = { x: 0, y: 0, angle: 0, penDown: true, penColor: '#00FF88', penSize: 2 };
let animationId = null;

function resizeCanvas() {
    const wrap = canvas.parentElement;
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
}

function toScreen(x, y) {
    return { x: canvas.width / 2 + x, y: canvas.height / 2 - y };
}

function drawTurtle(sx, sy, angle) {
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate((angle - 90) * Math.PI / 180 + Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(-8, 8);
    ctx.lineTo(8, 8);
    ctx.closePath();
    ctx.fillStyle = '#00FF88';
    ctx.fill();
    ctx.strokeStyle = '#009955';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    for (let i = -300; i <= 300; i += 50) {
        ctx.beginPath(); ctx.moveTo(cx + i, 0); ctx.lineTo(cx + i, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, cy + i); ctx.lineTo(canvas.width, cy + i); ctx.stroke();
    }
    // axes
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
}

function drawPath(commands, color, size) {
    let x = 0, y = 0, angle = 0, penDown = true, penColor = color || '#00FF88', penSize = size || 2;
    clearCanvas();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    function exec(cmds) {
        for (const cmd of cmds) {
            if (cmd.type === 'FORWARD' || cmd.type === 'BACKWARD') {
                const dir = cmd.type === 'FORWARD' ? 1 : -1;
                const rad = (angle - 90) * Math.PI / 180;
                const nx = x + dir * cmd.value * Math.cos(rad);
                const ny = y + dir * cmd.value * Math.sin(rad);
                if (penDown) {
                    const from = toScreen(x, -y);
                    const to = toScreen(nx, -ny);
                    ctx.beginPath();
                    ctx.moveTo(from.x, from.y);
                    ctx.lineTo(to.x, to.y);
                    ctx.strokeStyle = penColor;
                    ctx.lineWidth = penSize;
                    ctx.stroke();
                }
                x = nx; y = ny;
            } else if (cmd.type === 'RIGHT') angle += cmd.value;
            else if (cmd.type === 'LEFT') angle -= cmd.value;
            else if (cmd.type === 'PEN_UP') penDown = false;
            else if (cmd.type === 'PEN_DOWN') penDown = true;
            else if (cmd.type === 'PEN_COLOR') penColor = cmd.value;
            else if (cmd.type === 'PEN_SIZE') penSize = cmd.value;
            else if (cmd.type === 'HOME') { x = 0; y = 0; angle = 0; }
            else if (cmd.type === 'CLEAR') { clearCanvas(); }
            else if (cmd.type === 'REPEAT') {
                for (let r = 0; r < cmd.count; r++) exec(cmd.body);
            }
        }
    }
    exec(commands);
    const sp = toScreen(x, -y);
    drawTurtle(sp.x, sp.y, angle);
}

// Animated drawing
function animatePath(commands, onDone) {
    if (animationId) cancelAnimationFrame(animationId);
    const steps = [];
    let x = 0, y = 0, angle = 0, penDown = true, penColor = '#00FF88', penSize = 2;
    function flatten(cmds) {
        for (const cmd of cmds) {
            if (cmd.type === 'REPEAT') {
                for (let r = 0; r < cmd.count; r++) flatten(cmd.body);
            } else {
                steps.push({ ...cmd, _x: x, _y: y, _angle: angle, _penDown: penDown, _penColor: penColor, _penSize: penSize });
                if (cmd.type === 'FORWARD' || cmd.type === 'BACKWARD') {
                    const dir = cmd.type === 'FORWARD' ? 1 : -1;
                    const rad = (angle - 90) * Math.PI / 180;
                    x += dir * cmd.value * Math.cos(rad);
                    y += dir * cmd.value * Math.sin(rad);
                } else if (cmd.type === 'RIGHT') angle += cmd.value;
                else if (cmd.type === 'LEFT') angle -= cmd.value;
                else if (cmd.type === 'PEN_UP') penDown = false;
                else if (cmd.type === 'PEN_DOWN') penDown = true;
                else if (cmd.type === 'PEN_COLOR') penColor = cmd.value;
                else if (cmd.type === 'PEN_SIZE') penSize = cmd.value;
                else if (cmd.type === 'HOME') { x = 0; y = 0; angle = 0; }
            }
        }
    }
    flatten(commands);

    clearCanvas();
    let stepIdx = 0;
    let progress = 0;
    const SPEED = 3; // pixels per frame
    let cx = 0, cy = 0, ca = 0, cp = true, cc = '#00FF88', cs = 2;

    function frame() {
        if (stepIdx >= steps.length) {
            const sp = toScreen(cx, -cy);
            drawTurtle(sp.x, sp.y, ca);
            if (onDone) onDone();
            return;
        }
        const step = steps[stepIdx];
        if (step.type === 'FORWARD' || step.type === 'BACKWARD') {
            const dir = step.type === 'FORWARD' ? 1 : -1;
            const dist = step.value;
            const rad = (ca - 90) * Math.PI / 180;
            progress += SPEED;
            const t = Math.min(progress / dist, 1);
            const nx = step._x + dir * dist * t * Math.cos(rad);
            const ny = step._y + dir * dist * t * Math.sin(rad);
            if (cp) {
                const from = toScreen(cx, -cy);
                const to = toScreen(nx, -ny);
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.strokeStyle = cc;
                ctx.lineWidth = cs;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            cx = nx; cy = ny;
            // Redraw turtle at current pos
            const sp = toScreen(cx, -cy);
            // small clear around turtle (we just draw over)
            drawTurtle(sp.x, sp.y, ca);
            if (t >= 1) { progress = 0; stepIdx++; }
        } else if (step.type === 'RIGHT') { ca += step.value; stepIdx++; }
        else if (step.type === 'LEFT') { ca -= step.value; stepIdx++; }
        else if (step.type === 'PEN_UP') { cp = false; stepIdx++; }
        else if (step.type === 'PEN_DOWN') { cp = true; stepIdx++; }
        else if (step.type === 'PEN_COLOR') { cc = step.value; stepIdx++; }
        else if (step.type === 'PEN_SIZE') { cs = step.value; stepIdx++; }
        else if (step.type === 'HOME') { cx = 0; cy = 0; ca = 0; stepIdx++; }
        else if (step.type === 'CLEAR') { clearCanvas(); stepIdx++; }
        else { stepIdx++; }
        animationId = requestAnimationFrame(frame);
    }
    animationId = requestAnimationFrame(frame);
}

// ===== BLOCKLY <-> DSL =====
function workspaceToDSL() {
    const topBlocks = workspace.getTopBlocks(true);
    let dsl = '';
    function blockToDSL(block, indent) {
        const prefix = '  '.repeat(indent);
        let result = '';
        while (block) {
            const type = block.type;
            if (type === 'turtle_forward') result += prefix + 'FORWARD ' + block.getFieldValue('DIST') + '\n';
            else if (type === 'turtle_backward') result += prefix + 'BACKWARD ' + block.getFieldValue('DIST') + '\n';
            else if (type === 'turtle_right') result += prefix + 'RIGHT ' + block.getFieldValue('ANGLE') + '\n';
            else if (type === 'turtle_left') result += prefix + 'LEFT ' + block.getFieldValue('ANGLE') + '\n';
            else if (type === 'turtle_pen_up') result += prefix + 'PEN_UP\n';
            else if (type === 'turtle_pen_down') result += prefix + 'PEN_DOWN\n';
            else if (type === 'turtle_pen_color') result += prefix + 'PEN_COLOR ' + block.getFieldValue('COLOR') + '\n';
            else if (type === 'turtle_pen_size') result += prefix + 'PEN_SIZE ' + block.getFieldValue('SIZE') + '\n';
            else if (type === 'turtle_home') result += prefix + 'HOME\n';
            else if (type === 'turtle_clear') result += prefix + 'CLEAR\n';
            else if (type === 'turtle_repeat') {
                result += prefix + 'REPEAT ' + block.getFieldValue('TIMES') + ' {\n';
                const inner = block.getInputTargetBlock('DO');
                if (inner) result += blockToDSL(inner, indent + 1);
                result += prefix + '}\n';
            }
            block = block.getNextBlock();
        }
        return result;
    }
    for (const block of topBlocks) {
        dsl += blockToDSL(block, 0);
    }
    return dsl.trim();
}

function dslToWorkspace(dslText) {
    workspace.clear();
    const commands = parseDSL(dslText);
    if (!commands.length) return;

    let prevBlock = null;
    function createBlocks(cmds, parentConnection) {
        let prev = null;
        for (const cmd of cmds) {
            let block;
            if (cmd.type === 'FORWARD') { block = workspace.newBlock('turtle_forward'); block.setFieldValue(cmd.value, 'DIST'); }
            else if (cmd.type === 'BACKWARD') { block = workspace.newBlock('turtle_backward'); block.setFieldValue(cmd.value, 'DIST'); }
            else if (cmd.type === 'RIGHT') { block = workspace.newBlock('turtle_right'); block.setFieldValue(cmd.value, 'ANGLE'); }
            else if (cmd.type === 'LEFT') { block = workspace.newBlock('turtle_left'); block.setFieldValue(cmd.value, 'ANGLE'); }
            else if (cmd.type === 'PEN_UP') { block = workspace.newBlock('turtle_pen_up'); }
            else if (cmd.type === 'PEN_DOWN') { block = workspace.newBlock('turtle_pen_down'); }
            else if (cmd.type === 'PEN_COLOR') { block = workspace.newBlock('turtle_pen_color'); block.setFieldValue(cmd.value, 'COLOR'); }
            else if (cmd.type === 'PEN_SIZE') { block = workspace.newBlock('turtle_pen_size'); block.setFieldValue(cmd.value, 'SIZE'); }
            else if (cmd.type === 'HOME') { block = workspace.newBlock('turtle_home'); }
            else if (cmd.type === 'CLEAR') { block = workspace.newBlock('turtle_clear'); }
            else if (cmd.type === 'REPEAT') {
                block = workspace.newBlock('turtle_repeat');
                block.setFieldValue(cmd.count, 'TIMES');
                block.initSvg();
                block.render();
                if (cmd.body && cmd.body.length) {
                    createBlocks(cmd.body, block.getInput('DO').connection);
                }
            }
            if (!block) continue;
            block.initSvg();
            block.render();
            if (parentConnection && !prev) {
                parentConnection.connect(block.previousConnection);
            } else if (prev) {
                prev.nextConnection.connect(block.previousConnection);
            }
            prev = block;
        }
        return prev;
    }
    createBlocks(commands, null);
    // Position first block
    const topBlocks = workspace.getTopBlocks(true);
    if (topBlocks.length) topBlocks[0].moveBy(30, 30);
    workspace.render();
}

function updateDSLPreview() {

// ===== CHAT / API =====
function addChatMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.innerHTML = text.replace(/\n/g, '<br>');
    document.getElementById('chatHistory').appendChild(div);
    document.getElementById('chatHistory').scrollTop = 999999;
}

const SYSTEM_PROMPT = `너는 터틀 그래픽 코딩 도우미야.
아이가 거북이의 동작을 자연어로 설명하면,
아래 DSL 명령어만 사용해서 코드를 생성해.

사용 가능한 명령어:
FORWARD n, BACKWARD n, RIGHT d, LEFT d,
PEN_UP, PEN_DOWN, PEN_COLOR #hex, PEN_SIZE n,
REPEAT n { ... }, HOME, CLEAR

규칙:
1. DSL 코드만 출력할 것. 설명이나 인사말 금지.
2. 마크다운 코드블록(\`\`\`) 사용 금지.
3. 각 명령어는 한 줄에 하나씩 작성.
4. REPEAT의 중괄호는 반드시 짝을 맞출 것.
5. 색상은 반드시 #RRGGBB 형식 사용.`;

async function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isProcessing) return;
    input.value = '';
    addChatMsg('user', text);
    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;

    // Show loading
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'chat-msg ai';
    loadingDiv.innerHTML = '<span class="loading"></span> 생각하고 있어요...';
    document.getElementById('chatHistory').appendChild(loadingDiv);
    document.getElementById('chatHistory').scrollTop = 999999;

    try {
        const messages = [
            { role: 'system', content: SYSTEM_PROMPT },
            ...chatMessages.slice(-6),
            { role: 'user', content: text }
        ];
        const res = await fetch('/api/ai/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Auth-Token': AUTH_TOKEN },
            body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, temperature: 0.5, max_tokens: 1024 })
        });
        const data = await res.json();
        loadingDiv.remove();

        if (!res.ok) {
            addChatMsg('system', '⚠️ AI 호출 실패: ' + (data?.error?.message || data?.error || '알 수 없는 오류'));
            return;
        }

        let reply = data.choices?.[0]?.message?.content || '';
        // Clean up: remove markdown code blocks if any
        reply = reply.replace(/```[a-z]*\n?/g, '').replace(/```/g, '').trim();

        chatMessages.push({ role: 'user', content: text });
        chatMessages.push({ role: 'assistant', content: reply });

        // Check if response looks like DSL
        const isDSL = /^(FORWARD|BACKWARD|RIGHT|LEFT|PEN_UP|PEN_DOWN|PEN_COLOR|PEN_SIZE|REPEAT|HOME|CLEAR)/m.test(reply);

        if (isDSL) {
            addChatMsg('ai', '🐢 코드를 만들었어요!\n\n' + reply);
            // Parse and load into Blockly
            try {
                dslToWorkspace(reply);
                updateDSLPreview();
                // Also draw it
                const cmds = parseDSL(reply);
                animatePath(cmds, () => {
                    if (currentMission && currentMission.targetDSL) checkMission(reply);
                });
            } catch (e) {
                addChatMsg('system', '⚠️ 코드를 블록으로 변환하는 중 문제가 생겼어요.');
            }
        } else {
            addChatMsg('ai', reply);
        }
    } catch (e) {
        loadingDiv.remove();
        addChatMsg('system', '⚠️ 네트워크 오류: ' + e.message);
    } finally {
        isProcessing = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

function requestHint() {
    if (!currentMission) {
        addChatMsg('system', '먼저 미션을 선택해 주세요!');
        return;
    }
    addChatMsg('system', '💡 힌트: ' + currentMission.hint);
}

// ===== MISSION SYSTEM =====
function openMissionSelector() {
    const grid = document.getElementById('missionGrid');
    grid.innerHTML = '';
    for (const m of MISSIONS) {
        const done = completedMissions.includes(m.id);
        const card = document.createElement('div');
        card.className = 'mission-card' + (done ? ' completed' : '');
        card.innerHTML = `
            <span class="m-level" style="background:${m.levelColor}20;color:${m.levelColor}">${m.level}</span>
            <div class="m-title">${m.title}</div>
            <div class="m-desc">${m.description}</div>
            ${done ? '<span class="m-check">✅</span>' : ''}
        `;
        card.onclick = () => selectMission(m);
        grid.appendChild(card);
    }
    document.getElementById('missionModal').classList.add('show');
}

function closeMissionSelector() {
    document.getElementById('missionModal').classList.remove('show');
}

function selectMission(m) {
    currentMission = m;
    document.getElementById('levelBadge').textContent = m.level;
    document.getElementById('levelBadge').style.background = m.levelColor;
    document.getElementById('missionBadge').textContent = `미션 ${m.id}: ${m.title}`;
    closeMissionSelector();
    clearWorkspace();
    resetCanvas();
    chatMessages = [];
    document.getElementById('chatHistory').innerHTML = '';
    addChatMsg('system', `🎯 미션 ${m.id}: ${m.title}`);
    addChatMsg('system', m.description);
    if (m.targetDSL) {
        addChatMsg('system', '👀 "목표" 탭을 눌러 완성된 모양을 확인해 보세요!');
    }
    addChatMsg('system', '거북이에게 어떻게 움직이라고 할지 자연어로 설명해 주세요!');
}

function checkMission(studentDSL) {
    if (!currentMission || !currentMission.targetDSL) return;

    const targetPath = commandsToPath(parseDSL(currentMission.targetDSL));
    const studentPath = commandsToPath(parseDSL(studentDSL));
    const tolerance = currentMission.tolerance || 15;

    // Compare paths
    const maxLen = Math.max(targetPath.length, studentPath.length);
    let matchCount = 0;
    let firstMismatch = -1;
    let mismatchInfo = '';

    for (let i = 0; i < Math.min(targetPath.length, studentPath.length); i++) {
        const dx = Math.abs(targetPath[i].x - studentPath[i].x);
        const dy = Math.abs(targetPath[i].y - studentPath[i].y);
        if (dx <= tolerance && dy <= tolerance) {
            matchCount++;
        } else if (firstMismatch < 0) {
            firstMismatch = i;
            mismatchInfo = `${i}번째 지점에서 차이가 있어요. 목표(${Math.round(targetPath[i].x)},${Math.round(targetPath[i].y)}) vs 실행(${Math.round(studentPath[i].x)},${Math.round(studentPath[i].y)})`;
        }
    }

    const similarity = maxLen > 0 ? matchCount / maxLen : 0;

    if (similarity >= 0.8) {
        // Success!
        if (!completedMissions.includes(currentMission.id)) {
            completedMissions.push(currentMission.id);
            localStorage.setItem('turtle_completed', JSON.stringify(completedMissions));
        }
        showFeedback(true, '🎉 미션 성공!', '와! 정확해요! 거북이가 멋진 그림을 완성했어요!');
        addChatMsg('success', '🎉 미션 성공! 축하해요!');
    } else if (similarity >= 0.5) {
        showFeedback(false, '거의 다 됐어요! 💪', mismatchInfo || '조금만 더 수정하면 완성할 수 있어요!');
    } else {
        const feedback = mismatchInfo || '목표 모양과 많이 달라요. 힌트를 확인하고 다시 시도해 보세요!';
        addChatMsg('system', '🤔 ' + feedback);
    }
}

function showFeedback(success, title, text) {
    document.getElementById('fbIcon').textContent = success ? '🎉' : '💪';
    document.getElementById('fbTitle').textContent = title;
    document.getElementById('fbText').textContent = text;
    document.getElementById('fbNextBtn').style.display = success ? '' : 'none';
    document.getElementById('feedbackModal').classList.add('show');
}

function closeFeedback() {
    document.getElementById('feedbackModal').classList.remove('show');
}

function nextMission() {
    closeFeedback();
    if (!currentMission) return;
    const nextIdx = MISSIONS.findIndex(m => m.id === currentMission.id) + 1;
    if (nextIdx < MISSIONS.length) {
        selectMission(MISSIONS[nextIdx]);
    } else {
        addChatMsg('success', '🏆 모든 미션을 완료했어요! 대단해요!');
    }
}
