<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>문서 작성</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a1a;-webkit-text-size-adjust:100%;}
.container{max-width:800px;margin:0 auto;padding:10px 8px 90px;}
.card{background:white;border-radius:12px;padding:14px 12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);}

/* Header */
.doc-header{text-align:center;padding:10px 0 4px;}
.doc-header h1{font-size:17px;font-weight:800;margin-bottom:4px;}
.doc-header .badge{display:inline-block;background:#e3f2fd;color:#1565c0;padding:3px 12px;border-radius:16px;font-size:11px;font-weight:600;}
.doc-header .manager{font-size:12px;color:#666;margin-top:4px;}
.desc{background:#f0f7ff;padding:10px;border-radius:8px;font-size:13px;line-height:1.6;color:#333;}

/* PDF pages */
.pdf-page-wrap{position:relative;margin-bottom:12px;background:white;box-shadow:0 1px 8px rgba(0,0,0,0.1);border-radius:4px;overflow:visible;}
.pdf-page-wrap canvas{display:block;width:100%;height:auto;}
.pdf-fields-overlay{position:absolute;top:0;left:0;width:100%;height:100%;}
.page-indicator{text-align:center;font-size:11px;color:#999;margin:4px 0;font-weight:600;}

/* ===== Form Fields on PDF ===== */
.pdf-field{position:absolute;z-index:10;box-sizing:border-box;}
.pdf-field-text input,.pdf-field-date input,.pdf-field-select select{
    width:100%;height:100%;border:1px solid rgba(74,144,217,0.5);border-radius:2px;padding:1px 3px;
    font-size:inherit;background:rgba(255,255,255,0.85);outline:none;box-sizing:border-box;
}
.pdf-field-text input:focus,.pdf-field-date input:focus,.pdf-field-select select:focus{
    border-color:#1565c0;background:rgba(255,255,255,0.95);box-shadow:0 0 0 2px rgba(74,144,217,0.25);
}
.pdf-field-checkbox{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.8);border:1px solid rgba(74,144,217,0.5);border-radius:2px;padding:1px 3px;cursor:pointer;}
.pdf-field-checkbox input[type="checkbox"]{width:16px;height:16px;accent-color:#4A90D9;cursor:pointer;flex-shrink:0;}
.pdf-field-checkbox label{font-size:11px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Signature field */
.pdf-field-signature{border:1px solid rgba(229,57,53,0.5);border-radius:2px;background:rgba(255,255,255,0.9);overflow:hidden;cursor:crosshair;}
.pdf-field-signature canvas{display:block;width:100%;height:100%;touch-action:none;}
.sig-label{position:absolute;top:-14px;left:0;font-size:9px;color:#e53935;font-weight:700;white-space:nowrap;}
.sig-clear-btn{position:absolute;top:-14px;right:0;font-size:9px;background:#fff5f5;border:1px solid #ffcdd2;border-radius:3px;padding:0 4px;cursor:pointer;color:#e53935;line-height:14px;}

/* Extra fields */
.field-group{margin-bottom:14px;}
.field-label{font-size:14px;font-weight:700;margin-bottom:6px;display:block;color:#333;}
.field-label .req{color:#e53935;margin-left:2px;}
.field-input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;outline:none;background:white;-webkit-appearance:none;}
.field-input:focus{border-color:#4A90D9;box-shadow:0 0 0 3px rgba(74,144,217,0.15);}

/* Standalone signature */
.standalone-sig{border:2px dashed #ccc;border-radius:10px;overflow:hidden;position:relative;background:#fafafa;touch-action:none;}
.standalone-sig canvas{display:block;width:100%;}
.standalone-sig-clear{border:1px solid #ddd;background:white;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px;}

/* ===== Field Navigation Bar (above keyboard) ===== */
.field-nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#f0f0f0;border-top:1px solid #ccc;padding:6px 10px;display:none;align-items:center;gap:8px;justify-content:space-between;}
.field-nav-bar.show{display:flex;}
.field-nav-bar .nav-info{font-size:12px;color:#666;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.field-nav-bar button{background:#4A90D9;color:white;border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.field-nav-bar button:active{opacity:0.8;}
.field-nav-bar .done-btn{background:#2e7d32;}

/* ===== Submit ===== */
.submit-section{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px 14px;box-shadow:0 -3px 16px rgba(0,0,0,0.1);z-index:90;transition:transform .3s;}
.submit-section.hidden{transform:translateY(100%);}
.submit-inner{max-width:800px;margin:0 auto;}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4A90D9,#357abd);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.submit-btn:active{opacity:0.9;}
.submit-btn:disabled{background:#ccc;cursor:not-allowed;}
.submit-note{text-align:center;font-size:10px;color:#999;margin-top:4px;}

/* Loading / Error / Success */
.loading{text-align:center;padding:80px 20px;}
.loading .spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#4A90D9;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-page{text-align:center;padding:60px 20px;color:#666;}
.error-page .emoji{font-size:48px;margin-bottom:12px;}
.success-page{text-align:center;padding:60px 20px;}
.success-page .emoji{font-size:56px;margin-bottom:14px;}
.success-page h2{font-size:20px;margin-bottom:8px;color:#2e7d32;}

.field-error{border-color:#e53935!important;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Active field highlight */
.pdf-field.active-field{z-index:20;filter:drop-shadow(0 0 6px rgba(74,144,217,0.5));}
</style>
</head>
<body>
<div class="container" id="app">
    <div class="loading"><div class="spinner"></div><p>문서를 불러오는 중...</p></div>
</div>

<!-- Field navigation bar (shows when field focused) -->
<div class="field-nav-bar" id="fieldNavBar">
    <button onclick="navField(-1)">◀ 이전</button>
    <span class="nav-info" id="navInfo">1 / 5</span>
    <button onclick="navField(1)">다음 ▶</button>
    <button class="done-btn" onclick="doneEditing()">완료</button>
</div>

<div class="submit-section" id="submitSection">
    <div class="submit-inner">
        <button class="submit-btn" onclick="submitForm()" id="submitBtn">제출하기</button>
        <div class="submit-note" id="submitNote"></div>
    </div>
</div>

<script>
const token = location.pathname.split('/doc/')[1];
let docData = null;
let pdfDoc = null;
let signatureCanvases = {};
let pageScales = {};

// Field navigation
let fieldsList = [];
let currentFieldIdx = -1;
let isFieldFocused = false;
let initialWidth = 0; // track width to ignore keyboard resize

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function init() {
    if (!token) return showError('잘못된 링크입니다.');
    try {
        const res = await fetch('/api/tdist-public/' + token);
        if (res.status === 404) return showError('문서를 찾을 수 없습니다.\n링크가 올바른지 확인해주세요.');
        if (res.status === 410) { const d = await res.json(); return showError(d.error || '마감된 문서입니다.'); }
        if (!res.ok) return showError('서버 오류가 발생했습니다.');
        docData = await res.json();
        render();
    } catch (e) { showError('네트워크 오류: ' + e.message); }
}

function showError(msg) {
    document.getElementById('submitSection').style.display = 'none';
    document.getElementById('app').innerHTML = '<div class="card error-page"><div class="emoji">😔</div><h2>접근 불가</h2><p style="white-space:pre-line;margin-top:8px;">'+esc(msg)+'</p></div>';
}

async function render() {
    const app = document.getElementById('app');
    let h = '';

    // Header
    h += '<div class="doc-header"><h1>'+esc(docData.title)+'</h1>';
    h += '<span class="badge">문서 작성</span>';
    h += '<div class="manager">담당: '+esc(docData.manager||'')+(docData.deadline?' · 마감: '+docData.deadline:'')+'</div></div>';

    if (docData.description) {
        h += '<div class="card"><div class="desc">'+esc(docData.description).replace(/\n/g,'<br>')+'</div></div>';
    }

    // PDF container
    h += '<div id="pdfContainer"></div>';

    // Extra fields
    const extra = (docData.fields||[]).filter(f => f.page === undefined || f.page === null);
    if (extra.length) {
        h += '<div class="card" id="extraSection">';
        extra.forEach(f => { h += renderExtraField(f); });
        h += '</div>';
    }

    app.innerHTML = h;

    // Submit note
    document.getElementById('submitNote').textContent = (docData.deadline ? '마감: '+docData.deadline+' · ' : '') + '제출 후 수정 불가';

    // Render PDF
    if (docData.pdfData) {
        try {
            const bytes = base64ToUint8(docData.pdfData);
            pdfDoc = await pdfjsLib.getDocument({data:bytes}).promise;
            initialWidth = document.getElementById('pdfContainer').clientWidth;
            await renderPages();
        } catch(e) {
            console.error('PDF error:', e);
            document.getElementById('pdfContainer').innerHTML = '<div class="card" style="text-align:center;padding:20px;color:#e53935;">PDF 표시 불가</div>';
        }
    }

    // Init signatures + build field list
    setTimeout(() => {
        (docData.fields||[]).filter(f => f.type === 'signature').forEach(f => {
            if (f.page !== undefined && f.page !== null) initPdfSig(f.id);
            else initStandaloneSig(f.id);
        });
        buildFieldList();
        assignTabIndexes();
    }, 300);
}

async function renderPages() {
    const container = document.getElementById('pdfContainer');
    if (!container || !pdfDoc) return;

    const pages = docData.pdfPages || [];
    const total = pdfDoc.numPages;
    const toRender = pages.length > 0 ? pages : Array.from({length:total},(_,i)=>i+1);

    let h = '';
    for (let i = 0; i < toRender.length; i++) {
        h += '<div class="page-indicator">'+(i+1)+' / '+toRender.length+'</div>';
        h += '<div class="pdf-page-wrap" id="pw_'+i+'"><canvas id="pc_'+i+'"></canvas><div class="pdf-fields-overlay" id="fo_'+i+'"></div></div>';
    }
    container.innerHTML = h;

    for (let i = 0; i < toRender.length; i++) {
        const pn = toRender[i];
        if (pn < 1 || pn > total) continue;
        const page = await pdfDoc.getPage(pn);
        const canvas = document.getElementById('pc_'+i);
        const ctx = canvas.getContext('2d');
        const cw = canvas.parentElement.clientWidth;
        const vp0 = page.getViewport({scale:1});
        const sc = cw / vp0.width;
        const vp = page.getViewport({scale:sc});
        canvas.width = vp.width;
        canvas.height = vp.height;
        pageScales[i] = {scale:sc, w:vp.width, h:vp.height};
        await page.render({canvasContext:ctx, viewport:vp}).promise;
        renderFieldsOnPage(i);
    }
}

function renderFieldsOnPage(pi) {
    const ov = document.getElementById('fo_'+pi);
    if (!ov) return;
    const fields = (docData.fields||[]).filter(f => f.page === pi);
    let h = '';

    fields.forEach(f => {
        const st = 'left:'+f.x+'%;top:'+f.y+'%;width:'+f.width+'%;height:'+f.height+'%;';

        if (f.type === 'text') {
            h += '<div class="pdf-field pdf-field-text" style="'+st+'" data-fid="'+f.id+'">' +
                '<input type="text" id="f_'+f.id+'" placeholder="'+esc(f.placeholder||f.label||'')+'">' +
                '</div>';
        } else if (f.type === 'checkbox') {
            h += '<div class="pdf-field pdf-field-checkbox" style="'+st+'" data-fid="'+f.id+'">' +
                '<input type="checkbox" id="f_'+f.id+'">' +
                '<label for="f_'+f.id+'">'+esc(f.checkLabel||f.label||'')+'</label></div>';
        } else if (f.type === 'signature') {
            h += '<div class="pdf-field pdf-field-signature" style="'+st+'" id="sw_'+f.id+'" data-fid="'+f.id+'">' +
                '<span class="sig-label">'+esc(f.label||'서명')+'</span>' +
                '<button class="sig-clear-btn" onclick="clearSig(\''+f.id+'\')">지우기</button>' +
                '<canvas id="sc_'+f.id+'"></canvas></div>';
        } else if (f.type === 'date') {
            h += '<div class="pdf-field pdf-field-date" style="'+st+'" data-fid="'+f.id+'">' +
                '<input type="date" id="f_'+f.id+'" value="'+new Date().toISOString().slice(0,10)+'">' +
                '</div>';
        } else if (f.type === 'select') {
            const opts = (f.options||'').split(',').map(o=>o.trim()).filter(Boolean);
            h += '<div class="pdf-field pdf-field-select" style="'+st+'" data-fid="'+f.id+'">' +
                '<select id="f_'+f.id+'"><option value="">'+esc(f.label||'선택')+'</option>' +
                opts.map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('') +
                '</select></div>';
        }
    });

    ov.innerHTML = h;
}

function renderExtraField(f) {
    let h = '<div class="field-group" data-fid="'+f.id+'">';
    if (f.type === 'label') {
        h += '<div style="font-size:13px;line-height:1.7;white-space:pre-wrap;color:#444;">'+esc(f.content||'')+'</div>';
    } else {
        const req = f.required !== false && f.type !== 'file';
        h += '<span class="field-label">'+esc(f.label||'')+(req?'<span class="req">*</span>':'')+'</span>';

        if (f.type === 'text') h += '<input class="field-input" type="text" id="f_'+f.id+'" placeholder="'+esc(f.placeholder||'')+'">';
        if (f.type === 'date') h += '<input class="field-input" type="date" id="f_'+f.id+'" value="'+new Date().toISOString().slice(0,10)+'">';
        if (f.type === 'select') {
            const opts = (f.options||'').split(',').map(o=>o.trim()).filter(Boolean);
            h += '<select class="field-input" id="f_'+f.id+'"><option value="">선택</option>'+opts.map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('')+'</select>';
        }
        if (f.type === 'checkbox') {
            h += '<div style="display:flex;align-items:center;gap:10px;padding:12px;background:#fafafa;border-radius:8px;">' +
                '<input type="checkbox" id="f_'+f.id+'" style="width:24px;height:24px;accent-color:#4A90D9;flex-shrink:0;">' +
                '<label for="f_'+f.id+'" style="font-size:14px;cursor:pointer;">'+esc(f.checkLabel||'동의')+'</label></div>';
        }
        if (f.type === 'signature') {
            h += '<div class="standalone-sig" id="scon_'+f.id+'"><canvas id="sc_'+f.id+'" height="150"></canvas></div>' +
                '<button class="standalone-sig-clear" onclick="clearSig(\''+f.id+'\')">지우기</button>';
        }
    }
    h += '</div>';
    return h;
}

// ===== Field list & Tab navigation =====
function buildFieldList() {
    fieldsList = [];
    if (!docData || !docData.fields) return;
    const pdf = docData.fields.filter(f => f.page !== undefined && f.page !== null && f.type !== 'label');
    pdf.sort((a,b) => a.page !== b.page ? a.page - b.page : a.y - b.y);
    const extra = docData.fields.filter(f => (f.page === undefined || f.page === null) && f.type !== 'label');
    fieldsList = [...pdf, ...extra];
}

function assignTabIndexes() {
    fieldsList.forEach((f, i) => {
        const el = document.getElementById('f_' + f.id);
        if (el) {
            el.setAttribute('tabindex', i + 1);
            // Listen for focus to show nav bar and scroll
            el.addEventListener('focus', () => onFocus(f.id, i));
            el.addEventListener('blur', () => onBlur());
        }
    });
}

function onFocus(fieldId, idx) {
    isFieldFocused = true;
    currentFieldIdx = idx;

    // Show nav bar
    const nav = document.getElementById('fieldNavBar');
    nav.classList.add('show');
    document.getElementById('submitSection').classList.add('hidden');
    updateNavInfo();

    // Highlight active field
    document.querySelectorAll('.pdf-field.active-field').forEach(el => el.classList.remove('active-field'));
    const wrapper = document.querySelector('[data-fid="'+fieldId+'"]');
    if (wrapper) wrapper.classList.add('active-field');

    // Scroll the field into view smoothly after a tiny delay (let keyboard appear first)
    setTimeout(() => {
        const el = document.getElementById('f_' + fieldId);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 350);
}

function onBlur() {
    // Delay to check if focus moved to another field
    setTimeout(() => {
        const active = document.activeElement;
        // If focus is still on a form field, keep nav bar
        if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA')) return;
        isFieldFocused = false;
        document.getElementById('fieldNavBar').classList.remove('show');
        document.getElementById('submitSection').classList.remove('hidden');
        document.querySelectorAll('.pdf-field.active-field').forEach(el => el.classList.remove('active-field'));
    }, 200);
}

function updateNavInfo() {
    const info = document.getElementById('navInfo');
    if (!info) return;
    const f = fieldsList[currentFieldIdx];
    const label = f ? (f.label || f.placeholder || f.type) : '';
    info.textContent = (currentFieldIdx+1) + ' / ' + fieldsList.length + (label ? '  ·  ' + label : '');
}

function navField(dir) {
    let next = currentFieldIdx + dir;
    if (next < 0) next = 0;
    if (next >= fieldsList.length) next = fieldsList.length - 1;
    currentFieldIdx = next;
    const f = fieldsList[next];
    const el = document.getElementById('f_' + f.id);
    if (el) {
        el.focus(); // this triggers onFocus which scrolls
    }
}

function doneEditing() {
    const active = document.activeElement;
    if (active) active.blur();
    isFieldFocused = false;
    document.getElementById('fieldNavBar').classList.remove('show');
    document.getElementById('submitSection').classList.remove('hidden');
    document.querySelectorAll('.pdf-field.active-field').forEach(el => el.classList.remove('active-field'));
}

// ===== Signature =====
function initPdfSig(fid) {
    const wrap = document.getElementById('sw_'+fid);
    const canvas = document.getElementById('sc_'+fid);
    if (!wrap || !canvas) return;
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    setupSigCanvas(canvas, fid);
}

function initStandaloneSig(fid) {
    const canvas = document.getElementById('sc_'+fid);
    if (!canvas) return;
    canvas.width = canvas.parentElement.clientWidth;
    setupSigCanvas(canvas, fid);
}

function setupSigCanvas(canvas, fid) {
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    let drawing = false, signed = false;

    function pos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
    }
    function start(e) { e.preventDefault(); e.stopPropagation(); drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function move(e) { if (!drawing) return; e.preventDefault(); e.stopPropagation(); signed = true; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function end(e) { if (e) e.stopPropagation(); drawing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end);

    signatureCanvases[fid] = { canvas, ctx, hasSigned: () => signed, reset: () => { signed = false; } };
}

function clearSig(fid) {
    const sc = signatureCanvases[fid];
    if (!sc) return;
    sc.ctx.clearRect(0, 0, sc.canvas.width, sc.canvas.height);
    sc.reset();
}

// ===== Submit =====
let submitting = false;
async function submitForm() {
    if (submitting) return;
    const values = {};
    let valid = true, firstBad = null;

    (docData.fields||[]).forEach(f => {
        if (f.type === 'label') return;
        const req = f.required !== false && f.type !== 'file';
        const el = document.getElementById('f_'+f.id);

        if (f.type === 'text') {
            const v = el?.value?.trim() || '';
            if (req && !v) { valid = false; markErr(el); if (!firstBad) firstBad = el; }
            values[f.id] = v;
        } else if (f.type === 'date') {
            const v = el?.value || '';
            if (req && !v) { valid = false; markErr(el); if (!firstBad) firstBad = el; }
            values[f.id] = v;
        } else if (f.type === 'select') {
            const v = el?.value || '';
            if (req && !v) { valid = false; markErr(el); if (!firstBad) firstBad = el; }
            values[f.id] = v;
        } else if (f.type === 'checkbox') {
            const v = el?.checked || false;
            if (req && !v) { valid = false; if (!firstBad) firstBad = el; }
            values[f.id] = v;
        } else if (f.type === 'signature') {
            const sc = signatureCanvases[f.id];
            if (!sc || !sc.hasSigned()) { if (req) valid = false; }
            else values[f.id] = sc.canvas.toDataURL('image/png');
        }
    });

    if (!valid) {
        alert('필수 항목을 모두 작성해주세요.');
        if (firstBad) firstBad.scrollIntoView({behavior:'smooth',block:'center'});
        return;
    }
    if (!confirm('제출하시겠습니까?\n제출 후 수정 불가합니다.')) return;

    submitting = true;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '제출 중...';

    try {
        const res = await fetch('/api/tdist-public/'+token+'/submit', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({values})
        });
        if (!res.ok) { const d = await res.json(); throw new Error(d.error||'제출 실패'); }

        document.getElementById('submitSection').style.display = 'none';
        document.getElementById('fieldNavBar').style.display = 'none';
        document.getElementById('app').innerHTML =
            '<div class="card success-page"><div class="emoji">✅</div>' +
            '<h2>제출 완료!</h2>' +
            '<p style="color:#666;margin-top:8px;font-size:14px;">감사합니다. 담당 교사에게 전달됩니다.</p>' +
            '<p style="font-size:11px;color:#999;margin-top:16px;">'+new Date().toLocaleString('ko-KR')+'</p>' +
            '<div style="margin-top:20px;padding:14px;background:#f0f7ff;border-radius:10px;font-size:13px;color:#555;">' +
            '<strong>'+esc(docData.title)+'</strong><br>담당: '+esc(docData.manager||'')+'</div></div>';
    } catch(e) {
        alert('제출 실패: '+e.message);
        btn.disabled = false; btn.textContent = '제출하기';
        submitting = false;
    }
}

function markErr(el) {
    if (!el) return;
    el.classList.add('field-error');
    setTimeout(() => el.classList.remove('field-error'), 1500);
}

// ===== Utils =====
function base64ToUint8(b64) {
    const raw = b64.includes(',') ? b64.split(',')[1] : b64;
    const bin = atob(raw);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== Resize: ONLY re-render if WIDTH changed (ignore keyboard height changes) =====
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        const container = document.getElementById('pdfContainer');
        if (!container || !pdfDoc || !docData) return;
        const newWidth = container.clientWidth;
        // Only re-render if width actually changed (not keyboard open/close)
        if (Math.abs(newWidth - initialWidth) > 10) {
            initialWidth = newWidth;
            renderPages().then(() => {
                setTimeout(() => {
                    (docData.fields||[]).filter(f => f.type === 'signature' && f.page !== undefined && f.page !== null)
                        .forEach(f => initPdfSig(f.id));
                    assignTabIndexes();
                }, 200);
            });
        }
    }, 500);
});

init();
</script>
