// 내 작품 PNG 저장 (자유 창작 모드 결과물 공유용)
function saveArtwork(){
    const a=document.createElement('a');
    if(currentMode==='turtle'){
        a.href=tCanvas.toDataURL('image/png');
        a.download='터틀작품_'+new Date().toISOString().slice(0,10)+'.png';
    }else if(currentMode==='maze'){
        if(!mazeState){addChatMsg('system','먼저 🗺️ 모험 지도에서 미션을 골라 줘!');return;}
        const S=mazeState,cs=36,pad=12;
        const c=document.createElement('canvas');
        c.width=S.cols*cs+pad*2;c.height=S.rows*cs+pad*2;
        const x=c.getContext('2d');
        x.fillStyle='#1a1a2e';x.fillRect(0,0,c.width,c.height);
        x.font='22px "Segoe UI Emoji",sans-serif';x.textAlign='center';x.textBaseline='middle';
        for(let r=0;r<S.rows;r++)for(let cc=0;cc<S.cols;cc++){
            const ch=S.map[r][cc];
            x.fillStyle=ch==='#'?'#5a5a84':ch==='G'?'#1B3A4D':'#2E2E52';
            x.fillRect(pad+cc*cs+1,pad+r*cs+1,cs-2,cs-2);
            let em='';
            if(ch==='#')em='🪨';else if(ch==='G')em='🌀';
            else if(ch==='D'&&!S.collected.has(r+','+cc))em='💎';
            if(S.r===r&&S.c===cc)em='🐢';
            if(em)x.fillText(em,pad+cc*cs+cs/2,pad+r*cs+cs/2+1);
        }
        a.href=c.toDataURL('image/png');
        a.download='미로탐험_'+new Date().toISOString().slice(0,10)+'.png';
    }else{
        const cs=24,pad=10,n=pixelGridSize;
        const c=document.createElement('canvas');
        c.width=n*cs+pad*2;c.height=n*cs+pad*2;
        const x=c.getContext('2d');
        x.fillStyle='#1a1a2e';x.fillRect(0,0,c.width,c.height);
        for(let yy=0;yy<n;yy++)for(let xx=0;xx<n;xx++){
            x.fillStyle=pixelGrid[yy][xx]||'#26263f';
            x.fillRect(pad+xx*cs+1,pad+yy*cs+1,cs-2,cs-2);
        }
        a.href=c.toDataURL('image/png');
        a.download='픽셀작품_'+new Date().toISOString().slice(0,10)+'.png';
    }
    a.click();
    addChatMsg('system','💾 작품을 그림 파일로 저장했어요!');
}

const TURTLE_PROMPT=`너는 초등학생과 함께 그림을 그리는 거북이 탐험가 '토토'야.

사용 가능한 명령어:
FORWARD n, BACKWARD n, RIGHT d, LEFT d,

// DSL 한 줄 → 한국어 풀이 (프롬프트↔코드 연결을 눈으로 배우기)
function glossLine(l){
    let m;
    // 미로
    if(l==='MOVE')return'앞으로 한 칸 가기';
    if(l==='TURN_LEFT')return'왼쪽으로 돌기';
    if(l==='TURN_RIGHT')return'오른쪽으로 돌기';
    if(l==='PICK')return'💎 보석 줍기';
    if(/^IF\s+WALL/.test(l))return'┌ 만약 앞이 벽이면';
    if(/^\}\s*ELSE/.test(l))return'├ 아니면';
    if(m=l.match(/^FORWARD\s+(\S+)/))return'앞으로 '+m[1]+'만큼 가기';
    if(m=l.match(/^BACKWARD\s+(\S+)/))return'뒤로 '+m[1]+'만큼 가기';
    if(m=l.match(/^RIGHT\s+(\S+)/))return'오른쪽으로 '+m[1]+'° 돌기';
    if(m=l.match(/^LEFT\s+(\S+)/))return'왼쪽으로 '+m[1]+'° 돌기';
    if(l==='PEN_UP')return'펜 들기 (선 안 그려짐)';
    if(l==='PEN_DOWN')return'펜 내리기 (선 그려짐)';
    if(m=l.match(/^PEN_COLOR\s+(\S+)/))return'펜 색을 '+m[1]+'로 바꾸기';
    if(m=l.match(/^PEN_SIZE\s+(\S+)/))return'펜 굵기를 '+m[1]+'로';
    if(l==='HOME')return'처음 위치로 돌아가기';
    if(l==='CLEAR')return'화면 지우기';
    if(m=l.match(/^JUMP\s+(\S+)/))return m[1]+'만큼 점프 (선 없이 이동)';
    if(m=l.match(/^CIRCLE\s+(\S+)/))return'반지름 '+m[1]+'인 원 그리기';
    if(m=l.match(/^SAY\s+(.+)/))return'"'+m[1]+'" 말하기 💬';
    if(m=l.match(/^STAMP\s+(.+)/))return m[1]+' 도장 찍기';
    if(m=l.match(/^BG\s+(\S+)/))return'배경색 바꾸기';
    if(m=l.match(/^DEF\s+(\S+)/))return'┌ 📦 함수 "'+m[1]+'" 만들기';
    if(m=l.match(/^CALL\s+(\S+)/))return'📦 함수 "'+m[1]+'" 부르기';
    if(m=l.match(/^RECT\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/))return'('+m[1]+','+m[2]+')부터 ('+m[3]+','+m[4]+')까지 네모 채우기';
    if(m=l.match(/^BLINK\s+(\d+)\s+(\d+)\s+(\d+)/))return'(x:'+m[1]+', y:'+m[2]+') '+m[3]+'번 깜빡이기';
    if(m=l.match(/^REPEAT\s+(\d+)/))return'┌ 아래를 '+m[1]+'번 반복!';
    if(m=l.match(/^FOR\s+(\w+)\s+(\d+)\s+(\d+)/))return'┌ '+m[1]+'를 '+m[2]+'부터 '+m[3]+'까지 반복!';
    if(l==='}')return'└ 반복 끝';
    if(m=l.match(/^LED_ON\s+(\d+)\s+(\d+)/))return'(x:'+m[1]+', y:'+m[2]+') 불 켜기';
    if(m=l.match(/^LED_OFF\s+(\d+)\s+(\d+)/))return'(x:'+m[1]+', y:'+m[2]+') 불 끄기';
    if(m=l.match(/^LED_COLOR\s+(\d+)\s+(\d+)\s+(\S+)/))return'(x:'+m[1]+', y:'+m[2]+') '+m[3]+' 색으로';
    if(m=l.match(/^LED_TOGGLE\s+(\d+)\s+(\d+)/))return'(x:'+m[1]+', y:'+m[2]+') 켜짐↔꺼짐 바꾸기';
    if(m=l.match(/^FILL_ALL/))return'전체 채우기';
    if(m=l.match(/^FILL_ROW\s+(\d+)/))return'y:'+m[1]+' 가로줄 전체 켜기';
    if(m=l.match(/^FILL_COL\s+(\d+)/))return'x:'+m[1]+' 세로줄 전체 켜기';
    if(l==='CLEAR_ALL')return'전체 지우기';
    if(m=l.match(/^SHOW_ICON\s+(\w+)/))return m[1]+' 아이콘 보여주기';
    if(m=l.match(/^WAIT\s+(\d+)/))return m[1]+'ms 기다리기';
    if(m=l.match(/^ON_BUTTON_(\w+)/))return'┌ 버튼 '+m[1]+'을 누르면';
    if(l.startsWith('ON_SHAKE'))return'┌ 흔들면';
    if(l.startsWith('ON_START'))return'┌ 시작하면';
    if(m=l.match(/^IF\s+BUTTON_(\w+)/))return'┌ 만약 버튼 '+m[1]+'이 눌려 있으면';
    if(l.startsWith('ELSE'))return'├ 아니면';
    return'';
}

    if(m=l.match(/^FILL_ROW\s+(\d+)/))return'y:'+m[1]+' 가로줄을 통째로 켜야 하니까';
    if(m=l.match(/^FILL_COL\s+(\d+)/))return'x:'+m[1]+' 세로줄을 통째로 켜야 하니까';
    if(m=l.match(/^FILL_ALL/))return'전체를 한 번에 채워야 하니까';
    if(m=l.match(/^RECT/))return'네모난 영역을 통째로 칠해야 하니까';
    if(l==='CLEAR_ALL')return'화면을 깨끗이 해야 하니까';
    if(m=l.match(/^SHOW_ICON/))return'준비된 아이콘을 쓰면 빠르니까';
    if(m=l.match(/^WAIT/))return'잠깐 멈췄다가 다음 동작을 해야 하니까';
    if(m=l.match(/^BLINK/))return'반짝반짝 깜빡여야 하니까';
    if(m=l.match(/^ON_BUTTON_(\w+)/))return'"버튼 '+m[1]+'을 누르면"이라고 했으니까';
    if(l.startsWith('ON_SHAKE'))return'"흔들면"이라고 했으니까';
    if(l.startsWith('ON_START'))return'시작하자마자 실행돼야 하니까';
    if(m=l.match(/^IF/))return'조건에 따라 다르게 움직여야 하니까';
    if(m=l.match(/^FOR\s+(\w+)/))return m[1]+' 값을 하나씩 바꿔가며 반복해야 하니까';
    return'다음 동작이 필요하니까';
}

// AI 답변 → 블록이 하나씩 쌓이며 추론 과정이 채팅에 표시되는 조립 애니메이션
function animateAssembly(dsl){
    return new Promise(resolve=>{
        const blocks=workspace.getAllBlocks(true);
        if(!blocks.length)return resolve();
        const lines=dsl.split('\n').map(s=>s.trim()).filter(s=>s&&!s.startsWith('}')&&!s.startsWith('ELSE'));
        blocks.forEach(b=>{const r=b.getSvgRoot();if(r){r.style.transition='opacity .25s';r.style.opacity='0';}});
        const card=document.createElement('div');card.className='chat-msg think';
        card.innerHTML='<b>🧠 '+(currentMode==='pixel'?'픽셀':'토토')+'의 생각 — 네 말을 이렇게 블록으로 바꿨어! <span style="font-weight:400;font-size:10px;color:#999;">(누르면 빨리 감기)</span></b>';
        let fast=false;card.onclick=()=>{fast=true;};
        const h=document.getElementById('chatHistory');h.appendChild(card);h.scrollTop=999999;
        let i=0;
        (function step(){
            if(i>=blocks.length){workspace.render();return resolve();}
            const raw=(lines[i]||'').replace(/\s*\{$/,'');
            const row=document.createElement('div');row.className='think-row';
            row.innerHTML='<span class="think-why">'+reasonForLine(raw)+'</span><span class="think-block">→ 🧩 '+(glossLine(raw)||raw)+'</span>';
            card.appendChild(row);h.scrollTop=999999;
            const r=blocks[i].getSvgRoot();if(r)r.style.opacity='1';
            i++;setTimeout(step,fast?60:480);
        })();
    });
}

function addCodeMsg(dsl){
    const div=document.createElement('div');div.className='chat-msg code';
    const lines=dsl.split('\n').map(l=>l.trim()).filter(l=>l);
    let html='<div style="color:#B0BEC5;font-family:sans-serif;font-size:10px;margin-bottom:6px;">🤖 네 말이 이런 코드가 됐어!</div>';
    for(const l of lines){
        const g=glossLine(l.replace(/\s*\{$/,''))||glossLine(l);
        html+='<div class="code-line"><span class="dsl">'+l.replace(/</g,'&lt;')+'</span><span class="gloss">'+(g?'← '+g:'')+'</span></div>';
    }
    div.innerHTML=html;
    const h=document.getElementById('chatHistory');h.appendChild(div);h.scrollTop=999999;
}

async function sendChat(){
    const input=document.getElementById('chatInput');
    const text=input.value.trim();
    if(!text||isProcessing)return;
    input.value=''; addChatMsg('user',text);
    isProcessing=true; document.getElementById('sendBtn').disabled=true;

    const ld=document.createElement('div');ld.className='chat-msg ai';
    ld.innerHTML='<span class="loading"></span> '+(currentMode==='turtle'?'토토가 생각 중이야...':currentMode==='maze'?'탐정 토토가 추리 중이야...':'픽셀이 계산 중이야...');
    document.getElementById('chatHistory').appendChild(ld);
    document.getElementById('chatHistory').scrollTop=999999;

    try{
        const msgs=[{role:'system',content:currentMode==='turtle'?TURTLE_PROMPT:currentMode==='maze'?MAZE_PROMPT:PIXEL_PROMPT},...chatMessages.slice(-6),{role:'user',content:text}];
        const res=await fetch('/api/ai/chat',{method:'POST',
            headers:{'Content-Type':'application/json','X-Auth-Token':AUTH_TOKEN},
            body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:msgs,temperature:0.5,max_tokens:1024})
        });
        const data=await res.json(); ld.remove();
        if(!res.ok){console.error('AI error:',data?.error);addChatMsg('system','앗, '+(currentMode==='pixel'?'픽셀이':'토토가')+' 잠깐 딴생각을 했나 봐! 다시 한번 말해 줄래? 🙏');return;}

        let reply=data.choices?.[0]?.message?.content||'';
        reply=reply.replace(/```[a-z]*\n?/g,'').replace(/```/g,'').trim();
        chatMessages.push({role:'user',content:text});
        chatMessages.push({role:'assistant',content:reply});

        const isDSL = currentMode==='turtle'
            ? /^(FORWARD|BACKWARD|RIGHT|LEFT|PEN_UP|PEN_DOWN|PEN_COLOR|PEN_SIZE|REPEAT|HOME|CLEAR|JUMP|CIRCLE|SAY|STAMP|BG|DEF|CALL)/m.test(reply)
            : currentMode==='maze'
            ? /^(MOVE|TURN_LEFT|TURN_RIGHT|PICK|REPEAT|IF )/m.test(reply)
            : /^(LED_ON|LED_OFF|LED_COLOR|LED_TOGGLE|FILL_|CLEAR_ALL|SHOW_ICON|REPEAT|ON_|IF |FOR |WAIT|RECT|BLINK|DEF|CALL)/m.test(reply);

        if(isDSL){
            try{
                // 1단계: 블록을 만들되 숨겨두고, 추론 과정과 함께 하나씩 쌓기
                dslToWorkspace(reply); updateDSLPreview();
                await animateAssembly(reply);
                const blockCount=workspace.getAllBlocks(false).length;
                addChatMsg('ai',(currentMode==='turtle'?'🐢':currentMode==='maze'?'🔍':'🤖')+' 블록 '+blockCount+'개 완성! 이제 실행해 볼게~');
                // 2단계: 블록이 다 쌓인 뒤에 실행
                await new Promise(r=>setTimeout(r,600));
                if(currentMode==='turtle'){
                    const cmds=parseTurtleDSL(reply);
                    animateTurtle(cmds,()=>{if(currentMission?.targetDSL)checkTurtleMission(reply);});
                }else if(currentMode==='maze'){
                    await runMaze(parseMazeDSL(reply));
                }else{
                    clearPixelGrid(); pixelAnimCancel=false;
                    pixelEventHandlers={A:null,B:null,SHAKE:null};
                    const cmds=parsePixelDSL(reply);
                    await executePixelCommands(cmds);
                    if(currentMission?.targetGrid)checkPixelMission();
                }
            }catch(e){
                console.error('블록 변환 오류:',e);
                console.error('block convert error:',e);
                addChatMsg('system','앗, 블록을 만들다가 살짝 헷갈렸어! 조금 다르게 말해 줄래? 🙏');
            }
        }else{addChatMsg('ai',reply);}
    }catch(e){ld.remove();addChatMsg('system','⚠️ 네트워크 오류: '+e.message);}
    finally{isProcessing=false;document.getElementById('sendBtn').disabled=false;}
}

let hintStage=0; // 단계형 힌트: 1차=관찰 힌트, 2차=수학 돋보기
function requestHint(){
    if(!currentMission){addChatMsg('system','먼저 🗺️ 모험 지도에서 미션을 골라 줘!');return;}
    const sd=getStoryData(currentMission);
    const deep=currentMode==='maze'?sd.ct:sd.math; // 미로는 ct(생각 돋보기)로 2단계 힌트
    if(hintStage===0||!deep){
        addChatMsg('system','💡 힌트: '+currentMission.hint);
        if(deep)addChatMsg('system','한 번 더 누르면 🔍 '+(currentMode==='maze'?'생각 돋보기':'수학 돋보기')+'가 열려요!');
        hintStage=1;
    }else{
        addMathMsg(deep);
    }
}

const MAZE_PROMPT=`너는 초등학생과 함께 미로 유적을 탐험하는 거북이 탐정 '토토'야.
아이가 토토의 움직임을 자연어로 설명하면 DSL 코드로 변환해 줘.

교육 원칙 (가장 중요):
1. 아이가 "도착하게 해줘", "미로 풀어줘"처럼 답을 통째로 원하면 절대 코드를 주지 마.
   대신 딱 한 가지만 물어봐. 예: "좋아, 탐정! 토토가 먼저 몇 칸 가야 할까? 🔍"
   두세 번 물어봐도 모르면 힌트를 줘: "토토가 보는 쪽으로 손가락을 대고 길을 따라가 봐."
2. 아이가 "앞으로 세 칸 가고 오른쪽으로 돌아"처럼 동작을 구체적으로 말하면 바로 DSL 코드만 출력해.
3. 토토가 벽에 부딪히거나 보물을 지나쳐도 정답을 말하지 말고 관찰을 유도해:
   "토토가 어디서 멈췄지? 그 바로 앞 명령을 다시 봐!"
4. 같은 명령이 이어진 코드를 아이가 말하면 한 번은 권해줘: "반복되는 부분이 보여? REPEAT로 묶으면 짧아져!"
5. 방향은 토토 기준이야. 아이가 화면 기준과 헷갈려하면 "토토가 보는 쪽이 앞이야"라고 알려줘.
6. 답을 맞히면 짧게 칭찬해. 항상 반말로 다정하게, 2문장 이내로 짧게 말해.

사용 가능한 명령어:
MOVE (앞으로 한 칸), TURN_LEFT (왼쪽으로 돌기), TURN_RIGHT (오른쪽으로 돌기),
PICK (보석 줍기 — 보석 없는 칸에서는 그냥 무시됨),
REPEAT n { ... } (n번 반복),
IF WALL { ... } ELSE { ... } (앞이 벽이면 앞 묶음, 아니면 뒤 묶음 실행)

출력 규칙:
1. 코드를 출력할 때는 DSL 코드만. 설명·인사 금지, 마크다운 코드블록 금지.
2. 질문/대화할 때는 코드 없이 한국어만.
3. 각 명령어는 한 줄에 하나씩. 중괄호 짝 맞출 것.`;

let completedTurtle=JSON.parse(localStorage.getItem('turtle_completed')||'[]');
let completedPixel=JSON.parse(localStorage.getItem('pixel_completed')||'[]');
let completedMaze=JSON.parse(localStorage.getItem('maze_completed')||'[]');
let starsTurtle=JSON.parse(localStorage.getItem('turtle_stars')||'{}');
let starsPixel=JSON.parse(localStorage.getItem('pixel_stars')||'{}');
let starsMaze=JSON.parse(localStorage.getItem('maze_stars')||'{}');

function getMissions(){return currentMode==='turtle'?TURTLE_MISSIONS:currentMode==='maze'?MAZE_MISSIONS:PIXEL_MISSIONS;}
function getCompleted(){return currentMode==='turtle'?completedTurtle:currentMode==='maze'?completedMaze:completedPixel;}
function getStars(){return currentMode==='turtle'?starsTurtle:currentMode==='maze'?starsMaze:starsPixel;}
function saveCompleted(id){
    if(currentMode==='turtle'){if(!completedTurtle.includes(id)){completedTurtle.push(id);localStorage.setItem('turtle_completed',JSON.stringify(completedTurtle));}}
    else if(currentMode==='maze'){if(!completedMaze.includes(id)){completedMaze.push(id);localStorage.setItem('maze_completed',JSON.stringify(completedMaze));}}
    else{if(!completedPixel.includes(id)){completedPixel.push(id);localStorage.setItem('pixel_completed',JSON.stringify(completedPixel));}}
}
function saveStars(id,n){
    const s=getStars();
    if((s[id]||0)<n){s[id]=n;localStorage.setItem(currentMode==='turtle'?'turtle_stars':currentMode==='maze'?'maze_stars':'pixel_stars',JSON.stringify(s));}
    updateStarTotal();
}
function updateStarTotal(){
    const sum=Object.values(starsTurtle).reduce((a,b)=>a+b,0)+Object.values(starsPixel).reduce((a,b)=>a+b,0)+Object.values(starsMaze).reduce((a,b)=>a+b,0);
    const el=document.getElementById('starTotal');if(el)el.innerHTML='<img src="/assets/vibe/ui-star.png" alt="별"> '+sum;
}
function getChapterKey(m){return currentMode==='pixel'?pixelChapterKey(m):m.level;}
function getChapters(){return currentMode==='turtle'?TURTLE_CHAPTERS:currentMode==='maze'?MAZE_CHAPTERS:PIXEL_CHAPTERS;}
function getStoryData(m){return (currentMode==='turtle'?TURTLE_STORY:currentMode==='maze'?MAZE_STORY:PIXEL_STORY)[m.id]||{};}
function isFreeMission(m){if(currentMode==='maze')return false;return !m.targetDSL&&!m.targetGrid;}
function isUnlocked(m){
    if(isFreeMission(m))return true;
    const missions=getMissions(),completed=getCompleted();
    const chapter=missions.filter(x=>getChapterKey(x)===getChapterKey(m));
    const idx=chapter.findIndex(x=>x.id===m.id);
    return idx<=0||completed.includes(chapter[idx-1].id);
}

    const icons=currentMode==='turtle'?MISSION_ICONS_T:currentMode==='maze'?MISSION_ICONS_M:MISSION_ICONS_P;
    const g=document.getElementById('missionGrid');g.innerHTML='';
    document.getElementById('missionModalTitle').textContent=currentMode==='turtle'?'🗺️ 도형 행성 대모험 — 토토와 함께!':currentMode==='maze'?'🗺️ 미로 유적 대탐험 — 탐정 토토와 함께!':'🗺️ 픽셀 은하 구조대 — 픽셀과 함께!';
    // 챕터별로 미션을 묶어 스토리 맵 구성
    const order=[];const groups={};
    for(const m of missions){const k=getChapterKey(m);if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(m);}
    for(const key of order){
        const ch=chapters[key]||{emoji:'🪐',name:key,story:''};
        const list=groups[key];
        const doneCnt=list.filter(m=>completed.includes(m.id)).length;
        const block=document.createElement('div');block.className='chapter-block';
        block.innerHTML=`<div class="chapter-head"><span class="chapter-emoji">${ch.img?`<img src="/assets/vibe/${ch.img}.png" alt="${ch.name}">`:ch.emoji}</span>
            <div><div class="chapter-name">${ch.name} <span style="font-size:11px;color:var(--text-light);font-weight:600;">${key}</span></div>
            <div class="chapter-sub">${ch.story}</div></div>
            <span class="chapter-prog">${doneCnt}/${list.length} 완료</span></div>`;
        const path=document.createElement('div');path.className='node-path';
        list.forEach((m,i)=>{
            if(i>0){const link=document.createElement('span');link.className='node-link';link.textContent='›';path.appendChild(link);}
            const done=completed.includes(m.id),unlocked=isUnlocked(m);
            const st=stars[m.id]||0;
            const node=document.createElement('div');
            node.className='mission-node'+(done?' done':'')+(unlocked?'':' locked');
            const starImgs='<img src="/assets/vibe/ui-star.png" alt="⭐">'.repeat(done?(st||1):0);
            node.innerHTML=`<div class="n-icon">${unlocked?(icons[m.id]||'🪐'):'<img src="/assets/vibe/ui-lock.png" alt="잠김">'}</div>
                <div class="n-title">${m.title}</div>
                <div class="n-stars">${starImgs}</div>`;
            node.onclick=()=>{
                if(!unlocked){
                    node.style.animation='shake .4s';setTimeout(()=>node.style.animation='',420);
                    addChatMsg('system','🔒 앞 미션을 먼저 깨면 열려!');
                    return;
                }
                selectMission(m);
            };
            path.appendChild(node);
        });
        block.appendChild(path);g.appendChild(block);
    }
    document.getElementById('missionModal').classList.add('show');
}

function closeMissionSelector(){document.getElementById('missionModal').classList.remove('show');}

function selectMission(m){
    currentMission=m;
    document.getElementById('levelBadge').textContent=m.level;
    document.getElementById('levelBadge').style.background=m.levelColor;
    document.getElementById('missionBadge').textContent=`미션 ${m.id}: ${m.title}`;
    closeMissionSelector();
    // 스토리 인트로 먼저 보여주기 (코드모스 스타일)
    const ch=getChapters()[getChapterKey(m)]||{emoji:'🪐',name:''};
    const sd=getStoryData(m);
    document.getElementById('storyChar').innerHTML='<img src="/assets/vibe/'+(currentMode==='pixel'?'pixel-hello':'toto-hello')+'.svg" alt="'+(currentMode==='pixel'?'픽셀':'토토')+'" style="width:96px;height:96px;">';
    document.getElementById('storyChapter').textContent=`${ch.emoji} ${ch.name} · 미션 ${m.id}`;
    document.getElementById('storyTitle').textContent=m.title;
    document.getElementById('storyText').innerHTML=(sd.story||m.description)+
        `<div style="margin-top:8px;font-size:11px;color:var(--text-light);">${currentMode==='turtle'?'거북이 탐험가 토토':currentMode==='maze'?'우주 견습 탐정 토토':'로봇 픽셀'}가 너의 말을 기다리고 있어!</div>`;
    document.getElementById('storyModal').classList.add('show');
}

function startMissionPlay(){
    document.getElementById('storyModal').classList.remove('show');
    const m=currentMission;if(!m)return;
    hintStage=0;
    clearWorkspace(true);
    chatMessages=[];document.getElementById('chatHistory').innerHTML='';
    addChatMsg('system',`🎯 미션 ${m.id}: ${m.title}`);
    const sd=getStoryData(m);
    if(sd.story)addChatMsg('ai',(currentMode==='turtle'?'🐢 ':'🤖 ')+sd.story);
    renderChips(m);
    if(currentMode==='turtle'){
        resetTurtle();
        if(m.targetDSL){
            // 수학 카드는 여기서 미리 보여주지 않는다 (발견학습: 힌트 2단계·성공 후 정리에서 제공)
            addChatMsg('system','👀 목표 모양을 보여줄게! 길이 숫자랑 각도(°)를 잘 봐 둬.');
            setTimeout(()=>animateTurtle(parseTurtleDSL(m.targetDSL),()=>{
                addChatMsg('system','시연 끝! 잠시 후 👻 겹쳐보기만 남아. 나한테 말로 설명해 줘!');
                setTimeout(()=>resetTurtle(),3000);
            }),400);
        }
    }else if(currentMode==='maze'){
        // 미로는 시연 없음 — 맵이 처음부터 보이므로 바로 시작
        initMazeMission(m);
        addChatMsg('system','🗺️ 미로가 준비됐어! 토토를 🌀 보물까지 데려다 줘.'+(mazeState.gemsTotal?` 가는 길의 💎 보석 ${mazeState.gemsTotal}개도 잊지 말고!`:''));
    }else{
        if(m.gridSize&&m.gridSize!==pixelGridSize){
            pixelGridSize=m.gridSize;
            document.querySelectorAll('.grid-opt').forEach(b=>{
                b.classList.toggle('active',parseInt(b.textContent)===m.gridSize);
            });
        }
        initPixelGrid();
        renderTargetMini();
        if(m.targetGrid){
            addChatMsg('system','🎯 왼쪽의 "목표" 그림을 보고 똑같이 만들어 보세요. 좌표 숫자가 도와줄 거예요!');
            if(sd.math)addMathMsg(sd.math);
        }else if(sd.math)addMathMsg(sd.math);
    }
    if(isFreeMission(m))addChatMsg('system','자유롭게 AI에게 설명하거나 블록을 조합해 보세요!');
}

function addMathMsg(text){
    const div=document.createElement('div');div.className='chat-msg math';
    div.innerHTML='<b>🔍 '+(currentMode==='maze'?'생각 돋보기':'수학 돋보기')+'</b>'+text;
    const h=document.getElementById('chatHistory');h.appendChild(div);h.scrollTop=999999;
}

function renderChips(m){
    const row=document.getElementById('chipRow');if(!row)return;
    row.innerHTML='<span class="chip-label">💬 이렇게 말해봐</span>';
    const sd=m?getStoryData(m):null;
    const chips=(sd&&sd.chips)||(currentMode==='turtle'?TURTLE_CHIPS:currentMode==='maze'?MAZE_CHIPS:PIXEL_CHIPS);
    for(const c of chips){
        const s=document.createElement('span');s.className='chip';s.textContent=c;
        // 칩 탭 = 즉시 전송 (저학년 1탭 루프)
        s.onclick=()=>{const inp=document.getElementById('chatInput');inp.value=c;sendChat();tourEvent('chip');};
        row.appendChild(s);
    }
}

function checkTurtleMission(studentDSL){
    if(!currentMission?.targetDSL)return;
    const tp=turtleCommandsToPath(parseTurtleDSL(currentMission.targetDSL));
    const sp=turtleCommandsToPath(parseTurtleDSL(studentDSL));
    const tol=currentMission.tolerance||15, maxLen=Math.max(tp.length,sp.length);
    let match=0;
    for(let i=0;i<Math.min(tp.length,sp.length);i++){
        if(Math.abs(tp[i].x-sp[i].x)<=tol&&Math.abs(tp[i].y-sp[i].y)<=tol)match++;
    }
    const sim=maxLen>0?match/maxLen:0;
    if(sim>=0.8){
        const stars=sim>=0.97?3:sim>=0.9?2:1;
        saveCompleted(currentMission.id);saveStars(currentMission.id,stars);confetti();
        showFeedback(true,'🎉 미션 성공!',starComment(stars),stars);
        addChatMsg('success','🎉 미션 성공! '+'⭐'.repeat(stars));
        const sd=getStoryData(currentMission);
        if(sd.math)addMathMsg('오늘의 정리 📚 '+sd.math);
    }
    else if(sim>=0.5)showFeedback(false,'거의 다 왔어! 💪','목표랑 '+Math.round(sim*100)+'% 비슷해. 👻 겹쳐보기로 어디가 다른지 찾아봐!',0);
    else showFeedback(false,'괜찮아, 같이 해 보자! 🤝','👻 겹쳐보기로 목표랑 비교해 보고, 💡 힌트 버튼을 눌러 봐. 토토가 도와줄게!',0);
}

function starComment(n){
    return n>=3?'완벽해! 넌 진짜 코딩 박사야! 🏆':n>=2?'훌륭해! 조금만 더 정확하면 별 3개!':'성공! 다시 도전하면 별을 더 모을 수 있어.';
}

function confetti(){
    const wrap=document.createElement('div');wrap.className='confetti';
    const em=['🎉','⭐','✨','🎊','💫','🌟'];
    for(let i=0;i<26;i++){
        const s=document.createElement('span');
        s.textContent=em[i%em.length];
        s.style.left=Math.random()*100+'%';
        s.style.animationDelay=(Math.random()*0.5)+'s';
        s.style.fontSize=(13+Math.random()*16)+'px';
        wrap.appendChild(s);
    }
    document.body.appendChild(wrap);
    setTimeout(()=>wrap.remove(),3000);
}

function checkPixelMission(){
    if(!currentMission?.targetGrid)return;
    const t=currentMission.targetGrid;let match=0,total=0;
    for(let y=0;y<Math.min(pixelGridSize,t.length);y++)for(let x=0;x<Math.min(pixelGridSize,t[y].length);x++){
        total++;if(!!t[y][x]===!!pixelGrid[y]?.[x])match++;
    }
    const sim=total>0?match/total:0;
    if(sim>=0.9){
        const stars=sim>=1?3:sim>=0.95?2:1;
        saveCompleted(currentMission.id);saveStars(currentMission.id,stars);confetti();
        showFeedback(true,'🎉 미션 성공!',starComment(stars),stars);
        addChatMsg('success','🎉 미션 성공! '+'⭐'.repeat(stars));
    }
    else if(sim>=0.7)showFeedback(false,'거의 다 왔어! 💪',Math.round(sim*100)+'% 일치! 🎯 목표 그림과 좌표를 비교해 봐.',0);
    else showFeedback(false,'괜찮아, 같이 해 보자! 🤝',Math.round(sim*100)+'% 일치야. 🎯 목표 그림의 좌표를 하나씩 살펴보면 금방이야!',0);
}

function showFeedback(ok,title,text,stars){
    const ch=currentMode==='pixel'?(ok?'pixel-success':'pixel-think'):(ok?'toto-success':'toto-cheer');
    document.getElementById('fbIcon').innerHTML='<img src="/assets/vibe/'+ch+'.svg" alt="" style="width:110px;height:110px;">';
    const st=document.getElementById('fbStars');
    if(ok&&stars){
        st.innerHTML='';
        for(let i=0;i<3;i++){
            const s=document.createElement('span');
            s.className=i<stars?'lit':'dim';s.textContent='⭐';
            if(i<stars)s.style.animationDelay=(i*0.25)+'s';
            st.appendChild(s);
        }
    }else st.innerHTML='';
    document.getElementById('fbTitle').textContent=title;
    document.getElementById('fbText').textContent=text;
    document.getElementById('fbNextBtn').style.display=ok?'':'none';
    document.getElementById('feedbackModal').classList.add('show');
}
function closeFeedback(){document.getElementById('feedbackModal').classList.remove('show');}
function nextMission(){
    closeFeedback();if(!currentMission)return;
    const ms=getMissions(),idx=ms.findIndex(m=>m.id===currentMission.id)+1;
    if(idx<ms.length)selectMission(ms[idx]);
    else addChatMsg('success','🏆 모든 미션 완료! 대단해요!');
}

// ============================================================
//  온보딩 투어 — 토토가 나와서 사용법 안내 (행동형: 직접 눌러야 진행)
// ============================================================
let tourActive=false,tourIdx=0,tourSteps=[];
function makeTourSteps(){return[
    {target:null,char:'toto-hello',text:'안녕! 난 거북이 <b>토토</b>야.<br>나랑 같이 그림 그리는 법,<br>딱 4개만 알려줄게. 준비됐어?',btn:'그래!'},
    {target:'.canvas-panel',char:'toto-hello',text:'여기는 내 <b>놀이터</b>야!<br>내가 여기서 걸어다니면서 선을 그려.',btn:'다음'},
    {target:'.blockly-panel',char:'toto-think',text:'이 조각들이 내 <b>명령서(블록)</b>야.<br>블록을 끼운 순서대로 내가 움직여!<br>미리 하나 놓아 뒀어.',btn:'다음'},
    {target:'#runBtn',char:'toto-hello',text:'이제 <b>▶ 실행</b> 단추를 직접 눌러 봐!',advance:'run',wait:'▶ 실행을 눌러 봐!',
     praise:{char:'toto-success',text:'봤지? 방금 <b>네가 나를 움직인 거야!</b>'}},
    {target:'.chat-panel',char:'toto-hello',text:'글자를 안 쳐도 돼!<br>아래 <b>파란 말풍선 단추</b>를 눌러서<br>나한테 말을 걸어 봐.',advance:'chip',wait:'말풍선 단추를 눌러 봐! 💬',
     praise:{char:'toto-success',text:'우와! 네 말이 <b>블록으로 변하고 있어!</b>'}},
    {target:'#mapBtn',char:'toto-success',text:'이제 진짜 모험이야!<br><b>🗺️ 모험 지도</b>를 눌러서<br>첫 번째 미션을 골라 줘!',advance:'map',wait:'모험 지도를 눌러 봐! 🗺️'}
];}
function startTour(){
    tourSteps=makeTourSteps();tourIdx=0;tourActive=true;
    closeMissionSelector();
    document.getElementById('storyModal').classList.remove('show');
    document.getElementById('tourLayer').classList.remove('hidden');
    showTourStep();
}
function showTourStep(){
    const st=tourSteps[tourIdx];if(!st)return endTour();
    document.getElementById('tourChar').src='/assets/vibe/'+st.char+'.svg';
    document.getElementById('tourText').innerHTML=st.text;
    document.getElementById('tourStepLabel').textContent=(tourIdx+1)+' / '+tourSteps.length;
    const nb=document.getElementById('tourNextBtn'),w=document.getElementById('tourWait');
    if(st.advance){nb.classList.add('hidden');w.classList.remove('hidden');w.textContent=st.wait||'';}
    else{nb.classList.remove('hidden');w.classList.add('hidden');nb.textContent=st.btn||'다음';}
    const spot=document.getElementById('tourSpot'),bub=document.getElementById('tourBubble');
    let r=null;
    if(st.target){const el=document.querySelector(st.target);if(el)r=el.getBoundingClientRect();}
    if(r){
        spot.style.left=(r.left-6)+'px';spot.style.top=(r.top-6)+'px';
        spot.style.width=(r.width+12)+'px';spot.style.height=(r.height+12)+'px';
    }else{
        spot.style.left='50vw';spot.style.top='42vh';spot.style.width='0px';spot.style.height='0px';
    }
    requestAnimationFrame(()=>{
        const bw=bub.offsetWidth,bh=bub.offsetHeight,vw=innerWidth,vh=innerHeight;
        let bx,by;
        if(!r){bx=(vw-bw)/2;by=vh*0.30;}
        else{
            bx=Math.min(Math.max(r.left+r.width/2-bw/2,12),vw-bw-12);
            by=r.bottom+14;
            if(by+bh>vh-12)by=Math.max(r.top-bh-14,12);
            if(by+bh>vh-12)by=(vh-bh)/2;
        }
        bub.style.left=bx+'px';bub.style.top=by+'px';
    });
    // 실행 단계: 시범 블록을 미리 놓아 줌 (즉각적 성공 경험)
    if(st.advance==='run'&&workspace.getAllBlocks(false).length===0){
        const b=workspace.newBlock('t_forward');b.setFieldValue(100,'V');
        b.initSvg();b.render();b.moveBy(40,40);updateDSLPreview();
    }
    if(st.advance==='chip'&&!document.querySelector('#chipRow .chip'))renderChips(null);
}
function nextTourStep(){tourIdx++;if(tourIdx>=tourSteps.length)endTour();else showTourStep();}
// 행동 이벤트 수신: run/chip/map — 해당 단계면 칭찬 말풍선으로 전환
function tourEvent(kind){
    if(!tourActive)return false;
    const st=tourSteps[tourIdx];
    if(!st||st.advance!==kind)return false;
    if(kind==='map'){endTour();return true;}
    st.advance=null;
    setTimeout(()=>{
        document.getElementById('tourChar').src='/assets/vibe/'+st.praise.char+'.svg';
        document.getElementById('tourText').innerHTML=st.praise.text;
        document.getElementById('tourNextBtn').classList.remove('hidden');
        document.getElementById('tourWait').classList.add('hidden');
    },kind==='run'?1400:700);
    return true;
}
function endTour(){
    if(!tourActive){document.getElementById('tourLayer').classList.add('hidden');return;}
    tourActive=false;
    document.getElementById('tourLayer').classList.add('hidden');
    localStorage.setItem('vibe_onboarded','1');
    clearWorkspace(true);resetTurtle();
    setTimeout(()=>openMissionSelector(),300);
}
window.addEventListener('resize',()=>{if(tourActive)showTourStep();});

// ============================================================
//  INIT
// ============================================================
window.addEventListener('load',()=>{
    resizeTurtleCanvas(); clearTurtleCanvas();
    const sp=toScreen(0,0); drawTurtleSprite(sp.x,sp.y,0);
    initPixelGrid(); initPalette(); updateStarTotal();
    workspace=Blockly.inject('blocklyDiv',{toolbox:TURTLE_TOOLBOX,scrollbars:true,trashcan:true,
        zoom:{controls:true,wheel:true,startScale:0.9},grid:{spacing:20,length:3,colour:'#eee',snap:true}});
    workspace.addChangeListener(updateDSLPreview);
    // 첫 방문: 토토 온보딩 투어 / 재방문: 모험 지도
    if(!localStorage.getItem('vibe_onboarded'))setTimeout(()=>startTour(),600);
    else setTimeout(()=>openMissionSelector(),500);
});
window.addEventListener('resize',()=>{resizeTurtleCanvas();if(workspace)Blockly.svgResize(workspace);});
</script>
