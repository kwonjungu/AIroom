    <use href="#led" x="70" y="58"/><use href="#led" x="82" y="58"/><use href="#led" x="94" y="58"/><use href="#led" x="106" y="58"/><use href="#led" x="118" y="58"/>
    <use href="#led" x="70" y="70"/><use href="#led" x="82" y="70"/><use href="#led" x="94" y="70"/><use href="#led" x="106" y="70"/><use href="#led" x="118" y="70"/>
    <use href="#led" x="82" y="82"/><use href="#led" x="94" y="82"/><use href="#led" x="106" y="82"/>
    <use href="#led" x="94" y="94"/>
