    <rect x="66" y="118" width="68" height="52" rx="16" fill="#EAF6F2"/>
    <rect x="84" y="130" width="32" height="20" rx="5" fill="#7C4DFF" stroke="#5E35B1"/>
    <circle cx="100" cy="140" r="5" fill="#B39DDB" stroke="none"/>
    <!-- 두 팔 번쩍 -->
    <path d="M66 128 Q46 112 48 94" fill="none" stroke="#4A5568" stroke-width="13"/>
    <path d="M66 128 Q46 112 48 94" fill="none" stroke="#CFE7DF" stroke-width="7"/>
    <path d="M134 128 Q154 112 152 94" fill="none" stroke="#4A5568" stroke-width="13"/>
    <path d="M134 128 Q154 112 152 94" fill="none" stroke="#CFE7DF" stroke-width="7"/>
